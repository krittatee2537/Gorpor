rLine": "Answer: after", "explain": "สำนวน 'after meals' ใช้บอกช่วงเวลาหลังมื้ออาหาร ซึ่งเป็นคำบุพบทที่ใช้บอกลำดับเวลา"}, {"q": "The train ___ at 10 a.m. tomorrow.", "choices": ["leaves", "left", "was leaving", "has left"], "correct": 0, "answerLine": "Answer: leaves", "explain": "ตารางเวลาที่กำหนดไว้แน่นอนสำหรับอนาคต (เช่น ตารางรถไฟ) มักใช้ Present Simple Tense แม้จะพูดถึงเหตุการณ์ในอนาคต จึงต้องใช้ 'leaves'"}, {"q": "She is trying to ___ a new language by watching movies.", "choices": ["pick up", "pick out", "pick on", "pick over"], "correct": 0, "answerLine": "Answer: pick up", "explain": "สำนวน 'pick up' ในบริบทนี้หมายถึงเรียนรู้ทักษะใหม่โดยไม่ตั้งใจหรือผ่านการฝึกฝนแบบไม่เป็นทางการ"}, {"q": "I ___ my homework by the time you get home.", "choices": ["will finish", "finish", "will have finished", "finished"], "correct": 2, "answerLine": "Answer: will have finished", "explain": "เหตุการณ์ที่จะเสร็จสมบูรณ์ก่อนอีกเหตุการณ์หนึ่งในอนาคต (by the time you get home) ต้องใช้ Future Perfect Tense คือ 'will have finished'"}, {"q": "Choose the closest synonym of 'Astonish'.", "choices": ["Bore", "Amaze", "Calm", "Disappoint"], "correct": 1, "answerLine": "Answer: Amaze", "explain": "'Astonish' หมายถึงทำให้ประหลาดใจอย่างมาก ใกล้เคียงกับ 'Amaze'"}, {"q": "The company decided to ___ a new product next month.", "choices": ["bring out", "bring up", "bring on", "bring in"], "correct": 0, "answerLine": "Answer: bring out", "explain": "สำนวน 'bring out' หมายถึงเปิดตัวหรือนำผลิตภัณฑ์ใหม่ออกสู่ตลาด"}, {"q": "The children are afraid ___ the dark.", "choices": ["of", "from", "at", "with"], "correct": 0, "answerLine": "Answer: of", "explain": "สำนวน 'afraid of' ใช้บอกความกลัวต่อสิ่งใดสิ่งหนึ่ง จึงต้องใช้ 'of'"}, {"q": "Look! The children ___ in the park.", "choices": ["play", "are playing", "played", "have played"], "correct": 1, "answerLine": "Answer: are playing", "explain": "เหตุการณ์ที่กำลังเกิดขึ้น ณ ขณะที่พูด (Look!) ต้องใช้ Present Continuous Tense คือ 'are playing'"}, {"q": "Choose the closest synonym of 'Notorious'.", "choices": ["Famous (in a bad way)", "Unknown", "Respected", "Admired"], "correct": 0, "answerLine": "Answer: Famous (in a bad way)", "explain": "'Notorious' หมายถึงมีชื่อเสียงในทางไม่ดี ใกล้เคียงกับ 'Famous (in a negative sense)'"}, {"q": "We ___ in this city for ten years now.", "choices": ["live", "have lived", "lived", "are living"], "correct": 1, "answerLine": "Answer: have lived", "explain": "เหตุการณ์ที่เริ่มในอดีตและดำเนินต่อเนื่องมาถึงปัจจุบัน (for ten years, now) ต้องใช้ Present Perfect Tense คือ 'have lived'"}, {"q": "The manager is in charge ___ the entire department.", "choices": ["of", "for", "with", "at"], "correct": 0, "answerLine": "Answer: of", "explain": "สำนวน 'in charge of' ใช้บอกความรับผิดชอบต่อสิ่งใดสิ่งหนึ่ง จึงต้องใช้ 'of'"}]}];

let currentSet = 0;
let activeCat = "numerical";
// state[setIndex][catKey-idx] = {picked, correct}
let state = ALL_SETS.map(()=>({}));

function qid(catKey, idx){ return catKey+"-"+idx; }

function stampSVG(isCorrect){
  const color = isCorrect ? "#2F6B4F" : "#8B1E3F";
  const text = isCorrect ? "ถูกต้อง" : "ผิด";
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="44" fill="none" stroke="${color}" stroke-width="3"/>
    <circle cx="50" cy="50" r="37" fill="none" stroke="${color}" stroke-width="1.2"/>
    <text x="50" y="47" text-anchor="middle" font-family="Noto Serif Thai, serif" font-weight="700" font-size="15" fill="${color}">${text}</text>
    <text x="50" y="64" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" letter-spacing="1" fill="${color}">ก.พ. เฉลย</text>
  </svg>`;
}

function renderSetbar(){
  const bar = document.getElementById('setbar');
  bar.innerHTML = ALL_SETS.map((s, i)=>{
    const st = state[i];
    const done = Object.keys(st).length;
    return `<button class="setpill ${i===currentSet?'active':''}" data-set="${i}">ชุดที่ ${i+1} (${done}/80)</button>`;
  }).join('');
  bar.querySelectorAll('.setpill').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentSet = parseInt(btn.dataset.set);
      renderAll();
      window.scrollTo({top:0, behavior:'smooth'});
    });
  });
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  const setData = ALL_SETS[currentSet];
  tabs.innerHTML = CAT_ORDER.map(key => {
    const meta = CATEGORY_META[key];
    const qs = setData[key];
    const st = state[currentSet];
    const answeredInCat = qs.filter((_,i)=> st[qid(key,i)]).length;
    return `<button class="tab ${key===activeCat?'active':''}" data-cat="${key}">
      ${meta.label}<span class="count">${answeredInCat}/${qs.length}</span>
    </button>`;
  }).join('');
  tabs.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeCat = btn.dataset.cat;
      renderAll();
    });
  });
}

function renderMain(){
  const main = document.getElementById('main');
  const setData = ALL_SETS[currentSet];
  const meta = CATEGORY_META[activeCat];
  const qs = setData[activeCat];
  const st = state[currentSet];
  let html = `<div class="category-intro"><b>${meta.label}</b> — ${meta.intro}</div>`;
  qs.forEach((itemQ, idx)=>{
    const id = qid(activeCat, idx);
    const s = st[id];
    const answered = !!s;
    html += `
      <div class="qcard ${answered?'answered':''}" data-qid="${id}">
        <div class="qhead">
          <span class="qnum">ข้อ ${idx+1}</span>
          <span class="qtext">${itemQ.q}</span>
        </div>
        <div class="choices">
          ${itemQ.choices.map((c,ci)=>{
            let cls = 'choice';
            if(answered){
              if(ci===itemQ.correct) cls+=' correct';
              else if(ci===s.picked) cls+=' wrong-picked';
            }
            const keys = ['ก','ข','ค','ง'];
            return `<div class="${cls}" data-ci="${ci}"><span class="key">${keys[ci]}.</span><span>${c}</span></div>`;
          }).join('')}
        </div>
        <div class="explain ${answered?'open':''}">
          <div class="explain-inner">
            ${answered ? `<div class="stamp show">${stampSVG(s.correct)}</div>` : ''}
            <span class="explain-label">วิธีคิด</span>
            <div class="answer-line">${itemQ.answerLine}</div>
            <p>${itemQ.explain}</p>
          </div>
        </div>
      </div>
    `;
  });
  main.innerHTML = html;

  main.querySelectorAll('.qcard').forEach(card=>{
    const id = card.dataset.qid;
    if(st[id]) return;
    card.querySelectorAll('.choice').forEach(choiceEl=>{
      choiceEl.addEventListener('click', ()=>{
        const idx = parseInt(card.dataset.qid.split('-')[1]);
        const itemQ = qs[idx];
        const picked = parseInt(choiceEl.dataset.ci);
        st[id] = { picked, correct: picked === itemQ.correct };
        renderAll();
        setTimeout(()=>{
          const el = document.querySelector(`.qcard[data-qid="${id}"]`);
          if(el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
        }, 50);
      });
    });
  });
}

function renderScore(){
  const st = state[currentSet];
  const setData = ALL_SETS[currentSet];
  const total = CAT_ORDER.reduce((a,c)=>a+setData[c].length,0);
  const done = Object.keys(st).length;
  const correct = Object.values(st).filter(s=>s.correct).length;
  document.getElementById('setLabel').textContent = (currentSet+1);
  document.getElementById('doneCount').textContent = `${done}/${total}`;
  document.getElementById('correctCount').textContent = correct;
}

function renderAll(){
  renderSetbar();
  renderTabs();
  renderMain();
  renderScore();
}

document.getElementById('resetBtn').addEventListener('click', ()=>{
  state[currentSet] = {};
  renderAll();
});

renderAll();
</script>
</body>
</html>
