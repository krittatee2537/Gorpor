<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คลังข้อสอบ ก.พ. — 10 ชุด พร้อมเฉลยและวิธีคิด</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;600;700;900&family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4EFE1;
    --paper-dark:#EAE2CC;
    --navy:#16243F;
    --navy-2:#233457;
    --maroon:#8B1E3F;
    --maroon-2:#A8264B;
    --gold:#A9812F;
    --ink:#2A2118;
    --ink-soft:#5C5140;
    --line:#C9BFA0;
    --green:#2F6B4F;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(169,129,47,0.05), transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(139,30,63,0.04), transparent 45%);
    color:var(--ink);
    font-family:'Sarabun',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  .letterhead{
    background:var(--navy);
    background-image:linear-gradient(180deg,var(--navy) 0%,var(--navy-2) 100%);
    color:var(--paper);
    padding:28px 20px 22px;
    position:relative;
    border-bottom:6px solid var(--gold);
    overflow:hidden;
  }
  .letterhead::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 40px);
    pointer-events:none;
  }
  .letterhead-inner{
    max-width:960px;
    margin:0 auto;
    display:flex;
    align-items:center;
    gap:18px;
    position:relative;
    z-index:1;
  }
  .seal{
    flex:0 0 auto;
    width:64px;height:64px;
    border-radius:50%;
    border:2.5px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Serif Thai',serif;
    font-weight:700;
    font-size:11px;
    text-align:center;
    line-height:1.2;
    color:var(--gold);
    letter-spacing:0.5px;
  }
  .letterhead h1{
    font-family:'Noto Serif Thai',serif;
    font-weight:900;
    font-size:clamp(22px,4.2vw,32px);
    margin:0 0 4px;
    letter-spacing:0.3px;
  }
  .letterhead p.sub{
    margin:0;
    font-size:13.5px;
    letter-spacing:1.5px;
    color:#C9D3E6;
    font-family:'JetBrains Mono',monospace;
    text-transform:uppercase;
  }
  .letterhead .docno{
    margin-left:auto;
    text-align:right;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:#9FB0CC;
    line-height:1.7;
    white-space:nowrap;
  }

  /* ===== Set selector strip ===== */
  .setbar{
    background:var(--navy-2);
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .setbar-inner{
    max-width:960px;
    margin:0 auto;
    padding:10px 20px;
    display:flex;
    gap:8px;
    overflow-x:auto;
  }
  .setpill{
    flex:0 0 auto;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    color:#C9D3E6;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.14);
    padding:7px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
  }
  .setpill.active{
    background:var(--gold);
    color:var(--navy);
    border-color:var(--gold);
    font-weight:600;
  }

  /* ===== Score bar ===== */
  .scorebar{
    background:var(--paper-dark);
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    z-index:40;
  }
  .scorebar-inner{
    max-width:960px;
    margin:0 auto;
    padding:10px 20px;
    display:flex;
    align-items:center;
    gap:16px;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    color:var(--ink-soft);
    flex-wrap:wrap;
  }
  .scorebar .label{text-transform:uppercase; letter-spacing:1px; font-size:10.5px; color:var(--gold);}
  .scorebar .val{color:var(--navy); font-weight:600;}
  .scorebar .reset{
    margin-left:auto;
    background:none;
    border:1px solid var(--line);
    color:var(--ink-soft);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    padding:5px 10px;
    border-radius:3px;
    cursor:pointer;
  }
  .scorebar .reset:hover{border-color:var(--maroon); color:var(--maroon);}

  /* ===== Tabs ===== */
  .tabs{
    max-width:960px;
    margin:0 auto;
    padding:20px 20px 0;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  .tab{
    font-family:'Noto Serif Thai',serif;
    font-weight:600;
    font-size:14.5px;
    background:var(--paper-dark);
    color:var(--ink-soft);
    border:1px solid var(--line);
    border-bottom:none;
    padding:10px 16px 9px;
    border-radius:6px 6px 0 0;
    cursor:pointer;
    position:relative;
    top:1px;
  }
  .tab .count{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    color:var(--gold);
    margin-left:6px;
  }
  .tab.active{
    background:var(--paper);
    color:var(--navy);
    border-color:var(--line);
    border-bottom:1px solid var(--paper);
    box-shadow:0 -3px 0 var(--maroon) inset;
  }

  main{
    max-width:960px;
    margin:0 auto;
    padding:20px 20px 60px;
    border:1px solid var(--line);
    border-top:none;
    background:var(--paper);
    border-radius:0 0 8px 8px;
  }

  .category-intro{
    font-size:13.5px;
    color:var(--ink-soft);
    padding:14px 16px;
    background:rgba(169,129,47,0.08);
    border-left:3px solid var(--gold);
    border-radius:2px;
    margin-bottom:22px;
  }
  .category-intro b{color:var(--navy);}

  .qcard{
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    margin-bottom:16px;
    overflow:hidden;
    position:relative;
    transition:box-shadow 0.2s ease;
  }
  .qcard.answered{box-shadow:0 2px 10px rgba(22,36,63,0.06);}
  .qhead{
    display:flex;
    align-items:baseline;
    gap:12px;
    padding:16px 18px 10px;
  }
  .qnum{
    font-family:'JetBrains Mono',monospace;
    font-weight:600;
    font-size:12.5px;
    color:var(--maroon);
    background:rgba(139,30,63,0.08);
    padding:3px 8px;
    border-radius:4px;
    flex:0 0 auto;
  }
  .qtext{
    font-family:'Noto Serif Thai',serif;
    font-weight:600;
    font-size:16.5px;
    color:var(--ink);
    line-height:1.6;
  }
  .choices{
    padding:2px 18px 16px;
    display:grid;
    gap:8px;
  }
  .choice{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:9px 12px;
    border:1px solid var(--line);
    border-radius:6px;
    cursor:pointer;
    font-size:14.5px;
    line-height:1.5;
    background:var(--paper);
    transition:border-color 0.15s, background 0.15s;
  }
  .choice:hover{border-color:var(--gold);}
  .choice .key{
    font-family:'JetBrains Mono',monospace;
    font-weight:600;
    font-size:12.5px;
    color:var(--ink-soft);
    flex:0 0 auto;
    width:18px;
  }
  .qcard.answered .choice{cursor:default;}
  .qcard.answered .choice:hover{border-color:var(--line);}
  .choice.correct{
    background:rgba(47,107,79,0.09);
    border-color:var(--green);
  }
  .choice.correct .key{color:var(--green);}
  .choice.wrong-picked{
    background:rgba(139,30,63,0.07);
    border-color:var(--maroon);
  }
  .choice.wrong-picked .key{color:var(--maroon);}

  .explain{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.35s ease;
    background:var(--paper-dark);
    border-top:1px dashed var(--line);
  }
  .explain.open{max-height:600px;}
  .explain-inner{
    padding:16px 18px 18px;
    position:relative;
  }
  .explain-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:6px;
    display:block;
  }
  .explain p{
    margin:0;
    font-size:14px;
    line-height:1.75;
    color:var(--ink-soft);
  }
  .explain .answer-line{
    font-size:14px;
    color:var(--navy);
    font-weight:600;
    margin-bottom:8px;
  }

  .stamp{
    position:absolute;
    top:10px;
    right:16px;
    width:76px;
    height:76px;
    pointer-events:none;
    opacity:0;
    transform:rotate(-18deg) scale(0.4);
  }
  .stamp.show{
    animation:stampIn 0.5s cubic-bezier(.2,1.4,.4,1) forwards;
  }
  @keyframes stampIn{
    0%{opacity:0; transform:rotate(-24deg) scale(0.3);}
    60%{opacity:1; transform:rotate(-10deg) scale(1.12);}
    100%{opacity:0.92; transform:rotate(-13deg) scale(1);}
  }
  .stamp svg{width:100%;height:100%;}

  footer{
    max-width:960px;
    margin:0 auto;
    padding:24px 20px 50px;
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    letter-spacing:0.5px;
  }

  @media (max-width:600px){
    .qtext{font-size:15px;}
    .letterhead .docno{display:none;}
    .tab{font-size:13px; padding:9px 12px 8px;}
  }
</style>
</head>
<body>

<div class="letterhead">
  <div class="letterhead-inner">
    <div class="seal">คลัง<br>ข้อสอบ</div>
    <div>
      <h1>คลังข้อสอบ ก.พ.</h1>
      <p class="sub">10 ชุด · หมวดละ 20 ข้อ · เฉลย + วิธีคิด</p>
    </div>
    <div class="docno">ฉบับที่ 01/2569<br>สำหรับผู้เตรียมสอบภาค ก.</div>
  </div>
</div>

<div class="setbar">
  <div class="setbar-inner" id="setbar"></div>
</div>

<div class="scorebar">
  <div class="scorebar-inner">
    <span class="label">ชุดที่</span>
    <span class="val" id="setLabel">1</span>
    <span class="label">ทำแล้ว</span>
    <span class="val" id="doneCount">0/80</span>
    <span class="label">ตอบถูก</span>
    <span class="val" id="correctCount">0</span>
    <button class="reset" id="resetBtn">ล้างคำตอบชุดนี้</button>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<main id="main"></main>

<footer>
  แตะที่ตัวเลือกเพื่อดูเฉลยและวิธีคิดของแต่ละข้อ — ข้อมูลจัดทำเพื่อการฝึกฝนเท่านั้น
</footer>

<script>

  reasoning: { label: "ความสามารถด้านเหตุผล", intro: "โจทย์อุปมาอุปไมย ตรรกศาสตร์ อนุกรมตัวอักษร ปริศนาเครือญาติและทิศทาง" },
  thai: { label: "ภาษาไทย", intro: "หลักภาษาไทย การสะกดคำ คำราชาศัพท์ คำไวพจน์ และสำนวนไทย" },
  english: { label: "ภาษาอังกฤษ", intro: "ไวยากรณ์ คำศัพท์ บุพบท และโครงสร้างประโยคภาษาอังกฤษ" }
};
const CAT_ORDER = ["numerical","reasoning","thai","english"];

วามพร้อมเพรียงร่วมมือกัน คำตรงข้ามคือ 'แตกแยก' ซึ่งหมายถึงความแตกความสามัคคี"}, {"q": "สำนวนไทย 'ผีเสื้อบินเข้ากองไฟ' มีความหมายตรงกับข้อใด", "choices": ["คนที่กล้าเผชิญปัญหาอย่างมีสติ", "คนที่ทำร้ายตัวเองหรือหาเรื่องเดือดร้อนใส่ตัวโดยไม่รู้ตัว", "คนที่ช่วยเหลือผู้อื่นในยามยาก", "คนที่ระมัดระวังตัวอยู่เสมอ"], "correct": 1, "answerLine": "เฉลย: คนที่ทำร้ายตัวเองหรือหาเรื่องเดือดร้อนใส่ตัวโดยไม่รู้ตัว", "explain": "เปรียบกับผีเสื้อกลางคืนที่บินเข้าหาแสงไฟจนถูกไฟไหม้ สื่อถึงคนที่นำภัยหรือความเสียหายมาสู่ตนเองโดยไม่รู้ตัว"}], "english": [{"q": "The fire alarm went off, so everyone had to ___ the building immediately.", "choices": ["evacuate", "occupy", "construct", "renovate"], "correct": 0, "answerLine": "Answer: evacuate", "explain": "'Evacuate' หมายถึงอพยพออกจากสถานที่อย่างเร่งด่วน ซึ่งตรงกับบริบทเมื่อสัญญาณเตือนไฟไหม้ดังขึ้น"}, {"q": "By next year, he ___ his degree.", "choices": ["will complete", "completes", "will have completed", "completed"], "correct": 2, "answerLine": "Answer: will have completed", "explain": "เหตุการณ์ที่จะเสร็จสมบูรณ์ก่อนช่วงเวลาหนึ่งในอนาคต (by next year) ต้องใช้ Future Perfect Tense คือ 'will have completed'"}, {"q": "Choose the correct passive voice: 'The letters ___ before you arrive.'", "choices": ["will send", "will be sent", "send", "are sending"], "correct": 1, "answerLine": "Answer: will be sent", "explain": "เหตุการณ์ในอนาคตในรูป passive voice ใช้โครงสร้าง 'will be + V3' จึงต้องใช้ 'will be sent'"}, {"q": "Choose the correct sentence with a relative clause.", "choices": ["The man who I met him yesterday is my teacher.", "The man whom I met yesterday is my teacher.", "The man which I met yesterday is my teacher.", "The man I met yesterday him is my teacher."], "correct": 1, "answerLine": "Answer: The man whom I met yesterday is my teacher.", "explain": "เมื่อ 'who/whom' ทำหน้าที่เป็นกรรมของอนุประโยค ไม่ต้องมีสรรพนามซ้ำ (him) อีก และควรใช้ 'whom' เมื่อเป็นกรรมในระดับทางการ จึงเลือก 'whom I met yesterday'"}, {"q": "He was praised ___ his outstanding performance.", "choices": ["for", "of", "with", "to"], "correct": 0, "answerLine": "Answer: for", "explain": "สำนวน 'praise someone for + something' ใช้บอกสาเหตุของการชมเชย จึงต้องใช้ 'for'"}, {"q": "He is ___ for a promotion this year.", "choices": ["up", "due", "looking", "asking"], "correct": 1, "answerLine": "Answer: due", "explain": "สำนวน 'due for' หมายถึงถึงกำหนดหรือสมควรได้รับสิ่งใดสิ่งหนึ่งแล้ว (เช่น ถึงกำหนดได้เลื่อนตำแหน่ง)"}, {"q": "Choose the correct conditional sentence: 'If I were you, I ___ that job offer.'", "choices": ["accept", "will accept", "would accept", "would have accepted"], "correct": 2, "answerLine": "Answer: would accept", "explain": "ประโยคเงื่อนไขแบบที่ 2 (สมมติในปัจจุบัน มักใช้ให้คำแนะนำ) ใช้โครงสร้าง 'If + past simple, would + verb' จึงต้องใช้ 'would accept'"}, {"q": "Choose the closest antonym of 'Generous'.", "choices": ["Kind", "Stingy", "Wealthy", "Helpful"], "correct": 1, "answerLine": "Answer: Stingy", "explain": "'Generous' หมายถึงใจกว้าง เอื้อเฟื้อเผื่อแผ่ คำตรงข้ามคือ 'Stingy' ซึ่งหมายถึงขี้เหนียว"}, {"q": "Choose the correct sentence.", "choices": ["Each of the students have a laptop.", "Each of the students has a laptop.", "Each of the students having a laptop.", "Each of the student have a laptop."], "correct": 1, "answerLine": "Answer: Each of the students has a laptop.", "explain": "'Each of + plural noun' ทำหน้าที่เป็นประธานเอกพจน์เสมอ กริยาจึงต้องผันตามเอกพจน์ คือ 'has'"}, {"q": "The children were divided ___ two teams for the game.", "choices": ["into", "in", "on", "by"], "correct": 0, "answerLine": "Answer: into", "explain": "สำนวน 'divided into' ใช้บอกการแบ่งกลุ่มออกเป็นส่วนย่อย จึงต้องใช้ 'into' เช่นเดียวกับการแบ่งบท"}, {"q": "They decided to ___ the wedding until next spring.", "choices": ["put off", "take off", "call off entirely", "give off"], "correct": 0, "answerLine": "Answer: put off", "explain": "สำนวน 'put off' หมายถึงเลื่อนออกไปยังเวลาหลัง (postpone) ตรงกับบริบทของการเลื่อนงานแต่งงาน"}, {"q": "She has been suffering ___ a severe headache all day.", "choices": ["from", "of", "with", "for"], "correct": 0, "answerLine": "Answer: from", "explain": "สำนวน 'suffer from + illness' ใช้บอกอาการเจ็บป่วยที่กำลังประสบอยู่ จึงต้องใช้ 'from'"}, {"q": "Choose the closest antonym of 'Optimistic'.", "choices": ["Hopeful", "Confident", "Pessimistic", "Enthusiastic"], "correct": 2, "answerLine": "Answer: Pessimistic", "explain": "'Optimistic' หมายถึงมองโลกในแง่ดี คำตรงข้ามคือ 'Pessimistic' ซึ่งหมายถึงมองโลกในแง่ร้าย"}, {"q": "While she ___ dinner, the phone rang.", "choices": ["cooked", "was cooking", "cooks", "had cooked"], "correct": 1, "answerLine": "Answer: was cooking", "explain": "เหตุการณ์ที่กำลังดำเนินอยู่ในอดีตแล้วถูกขัดจังหวะด้วยอีกเหตุการณ์หนึ่ง (โทรศัพท์ดัง) ต้องใช้ Past Continuous คือ 'was cooking'"}, {"q": "Choose the closest synonym of 'Meticulous'.", "choices": ["Careless", "Careful", "Quick", "Lazy"], "correct": 1, "answerLine": "Answer: Careful", "explain": "'Meticulous' หมายถึงพิถีพิถัน ละเอียดรอบคอบมาก ใกล้เคียงกับ 'Careful'"}, {"q": "He is responsible ___ this project.", "choices": ["of", "for", "to", "with"], "correct": 1, "answerLine": "Answer: for", "explain": "สำนวน 'responsible for' เป็น fixed collocation หมายถึง 'รับผิดชอบต่อ' จึงต้องใช้ 'for' คู่กับ 'responsible' เสมอ"}, {"q": "I ___ my homework before I went to bed last night.", "choices": ["finish", "finished", "had finished", "have finished"], "correct": 2, "answerLine": "Answer: had finished", "explain": "เหตุการณ์ที่เกิดขึ้นก่อนอีกเหตุการณ์หนึ่งในอดีต (before I went to bed) ต้องใช้ Past Perfect Tense คือ 'had finished'"}, {"q": "The plane will ___ at 6 p.m. sharp.", "choices": ["take off", "take on", "take in", "take out"], "correct": 0, "answerLine": "Answer: take off", "explain": "สำนวน 'take off' หมายถึงเครื่องบินออกเดินทาง (บินขึ้น)"}, {"q": "Choose the closest synonym of 'Persistent'.", "choices": ["Determined", "Weak", "Hesitant", "Careless"], "correct": 0, "answerLine": "Answer: Determined", "explain": "'Persistent' หมายถึงมุ่งมั่นไม่ย่อท้อ ใกล้เคียงกับ 'Determined'"}, {"q": "This gift is ___ you, from all of us.", "choices": ["for", "to", "of", "with"], "correct": 0, "answerLine": "Answer: for", "explain": "เมื่อบอกว่าของสิ่งนี้มีไว้เพื่อมอบให้ใคร ต้องใช้ 'for' บอกผู้รับ"}]}, {"numerical": [{"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 4, 6, 10, 16, 24, ?", "choices": ["33", "35", "36", "34"], "correct": 3, "answerLine": "เฉลย: 34", "explain": "ผลต่างระหว่างพจน์คือ 2, 4, 6, 8 ตามลำดับ (เพิ่มขึ้นทีละ 2) ผลต่างถัดไปคือ 10 นำไปบวกกับ 24 จะได้ 24 + 10 = 34"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 4, 12, 36, 108, 324, ?", "choices": ["975", "969", "972", "810"], "correct": 2, "answerLine": "เฉลย: 972", "explain": "แต่ละพจน์เกิดจากพจน์ก่อนหน้าคูณด้วย 3 ดังนั้นพจน์ถัดไปคือ 324 × 3 = 972"}, {"q": "สินค้าราคา 1000 บาท ลดราคา 15% แล้วภายหลังปรับราคาขึ้นอีก 15% จากราคาที่ลดแล้ว ราคาสุดท้ายเป็นเท่าใด", "choices": ["998 บาท", "978 บาท", "1000 บาท", "983 บาท"], "correct": 1, "answerLine": "เฉลย: 978 บาท", "explain": "ลด 15% จาก 1000 = 1000 × 85/100 = 850 บาท จากนั้นปรับขึ้น 15% จากราคาที่ลดแล้ว = 850 × 115/100 = 978 บาท (ข้อควรระวัง: ร้อยละที่สองคำนวณจากราคาใหม่ ไม่ใช่ราคาเดิม)"}, {"q": "นาย A ทำงานชิ้นหนึ่งเสร็จใน 8 วัน นาย B ทำงานชิ้นเดียวกันเสร็จใน 20 วัน ถ้าทั้งสองคนทำงานร่วมกัน จะเสร็จภายในกี่วัน", "choices": ["40/7 วัน", "40/8 วัน", "41/7 วัน", "28 วัน"], "correct": 0, "answerLine": "เฉลย: 40/7 วัน", "explain": "อัตราการทำงานของ A = 1/8 ของงานต่อวัน, ของ B = 1/20 ของงานต่อวัน รวมกัน = 1/8 + 1/20 = 7/40 ของงานต่อวัน ดังนั้นทำงานเสร็จใน 40/7 วัน"}, {"q": "นักเรียน 4 คน สอบได้คะแนนเฉลี่ย 65 คะแนน หากมีนักเรียนคนที่ 5 เข้ามาสอบและได้ 88 คะแนน คะแนนเฉลี่ยใหม่ของนักเรียนทั้ง 5 คนเป็นเท่าใด (ปัดเศษ 2 ตำแหน่ง)", "choices": ["68.6", "71.6", "70.6", "69.6"], "correct": 3, "answerLine": "เฉลย: 69.6", "explain": "คะแนนรวมเดิมของ 4 คน = 65 × 4 = 260 คะแนน เมื่อรวมคนที่ 5 ที่ได้ 88 คะแนน จะได้คะแนนรวม = 260 + 88 = 348 คะแนน หารด้วยจำนวนคน 5 คน = 348 ÷ 5 ≈ plain": "เปรียบกับการตำน้ำพริกอย่างประณีตแล้วนำไปละลายในแม่น้ำ ทำให้ความพยายามทั้งหมดสูญเปล่าไม่เกิดประโยชน์"}, {"q": "___ ฝนจะตกหนัก เขาก็ยังไปทำงานตามปกติ", "choices": ["เพราะ", "แม้ว่า", "ดังนั้น", "เนื่องจาก"], "correct": 1, "answerLine": "เฉลย: แม้ว่า", "explain": "ประโยคนี้แสดงความขัดแย้งระหว่างสถานการณ์ (ฝนตกหนัก) กับการกระทำที่ไม่เปลี่ยนแปลง (ยังไปทำงาน) จึงต้องใช้คำเชื่อม 'แม้ว่า' ที่คู่กับ 'ก็' แสดงการยอมรับเงื่อนไขแต่ผลไม่เปลี่ยน"}, {"q": "'โอ้โห! สวยงามมากเลย' คำว่า 'โอ้โห' เป็นคำชนิดใด", "choices": ["คำอุทาน", "คำสรรพนาม", "คำสันธาน", "คำนาม"], "correct": 0, "answerLine": "เฉลย: คำอุทาน", "explain": "คำว่า 'โอ้โห' เป็นคำที่แสดงอารมณ์ความรู้สึกตื่นเต้นหรือประหลาดใจโดยไม่มีความหมายในตัวเอง จึงจัดเป็น 'คำอุทาน'"}], "english": [{"q": "She was able to ___ her fear of public speaking.", "choices": ["get over", "get on", "get by", "get off"], "correct": 0, "answerLine": "Answer: get over", "explain": "สำนวน 'get over' หมายถึงเอาชนะหรือฟื้นตัวจากปัญหา/ความกลัว"}, {"q": "Choose the correct passive voice form: 'The report ___ by the manager yesterday.'", "choices": ["wrote", "was written", "is written", "has written"], "correct": 1, "answerLine": "Answer: was written", "explain": "ประโยคนี้อยู่ในรูป passive voice ของ past simple tense เพราะมีคำบอกเวลา 'yesterday' โครงสร้างคือ 'was/were + V3' จึงต้องใช้ 'was written'"}, {"q": "The manager asked the team to ___ the deadline by two days.", "choices": ["extend", "reduce", "cancel", "ignore"], "correct": 0, "answerLine": "Answer: extend", "explain": "'Extend' หมายถึงขยายหรือยืดออกไป ตรงกับบริบทของการขยายกำหนดเวลา"}, {"q": "Choose the closest synonym of 'Candid'.", "choices": ["Deceptive", "Honest", "Secretive", "Vague"], "correct": 1, "answerLine": "Answer: Honest", "explain": "'Candid' หมายถึงตรงไปตรงมา ซื่อตรง ใกล้เคียงกับ 'Honest'"}, {"q": "Choose the correct conditional sentence (mixed conditional): 'If she had taken the medicine, she ___ better now.'", "choices": ["would feel", "would have felt", "will feel", "felt"], "correct": 0, "answerLine": "Answer: would feel", "explain": "ประโยคเงื่อนไขแบบผสม (mixed conditional) ใช้เมื่อเงื่อนไขอยู่ในอดีต (had taken) แต่ผลลัพธ์อยู่ในปัจจุบัน (now) โครงสร้างคือ 'If + past perfect, would + verb (base form)' จึงต้องใช้ 'would feel'"}, {"q": "The new policy will come ___ effect next month.", "choices": ["into", "in", "on", "to"], "correct": 0, "answerLine": "Answer: into", "explain": "สำนวน 'come into effect' หมายถึงเริ่มมีผลบังคับใช้ เป็นสำนวนตายตัวที่ต้องใช้ 'into'"}, {"q": "The results of the survey are consistent ___ our expectations.", "choices": ["with", "to", "in", "for"], "correct": 0, "answerLine": "Answer: with", "explain": "สำนวน 'consistent with' ใช้บอกความสอดคล้องกับสิ่งใดสิ่งหนึ่ง จึงต้องใช้ 'with'"}, {"q": "He had to ___ his old car because it kept breaking down.", "choices": ["get rid of", "get away with", "get on with", "get through"], "correct": 0, "answerLine": "Answer: get rid of", "explain": "สำนวน 'get rid of' หมายถึงกำจัดหรือทิ้งสิ่งที่ไม่ต้องการ"}, {"q": "Choose the closest antonym of 'Transparent'.", "choices": ["Clear", "Obvious", "Opaque", "Visible"], "correct": 2, "answerLine": "Answer: Opaque", "explain": "'Transparent' หมายถึงโปร่งใสหรือมองทะลุได้ คำตรงข้ามคือ 'Opaque' ซึ่งหมายถึงทึบแสงมองไม่ทะลุ"}, {"q": "Choose the closest synonym of 'Vivid'.", "choices": ["Dull", "Bright/Clear", "Faded", "Boring"], "correct": 1, "answerLine": "Answer: Bright/Clear", "explain": "'Vivid' หมายถึงสดใสชัดเจน (มักใช้กับสีสันหรือความทรงจำ) ใกล้เคียงกับ 'Bright/Clear'"}, {"q": "Choose the closest antonym of 'Concise'.", "choices": ["Brief", "Short", "Wordy", "Compact"], "correct": 2, "answerLine": "Answer: Wordy", "explain": "'Concise' หมายถึงกระชับได้ใจความ คำตรงข้ามคือ 'Wordy' ซึ่งหมายถึงใช้คำมากเกินความจำเป็น"}, {"q": "Choose the correct sentence.", "choices": ["Despite of the rain, we went out.", "Despite the rain, we went out.", "Although the rain, we went out.", "Despite it rained, we went out."], "correct": 1, "answerLine": "Answer: Despite the rain, we went out.", "explain": "'Despite' ตามด้วยคำนามหรือ gerund โดยตรง ไม่ต้องมี 'of' จึงต้องใช้ 'Despite the rain'"}, {"q": "Look at those dark clouds! It ___ soon.", "choices": ["rains", "will rain", "is going to rain", "rained"], "correct": 2, "answerLine": "Answer: is going to rain", "explain": "การคาดการณ์จากหลักฐานที่เห็นอยู่ในปัจจุบัน (dark clouds) มักใช้โครงสร้าง 'be going to' คือ 'is going to rain'"}, {"q": "She decided to ___ smoking for her health.", "choices": ["give up", "give in", "give out", "give away"], "correct": 0, "answerLine": "Answer: give up", "explain": "สำนวน 'give up' หมายถึงเลิกทำสิ่งใดสิ่งหนึ่ง (เช่น เลิกสูบบุหรี่)"}, {"q": "By the time we arrived, the meeting ___.", "choices": ["already started", "has already started", "had already started", "already starts"], "correct": 2, "answerLine": "Answer: had already started", "explain": "โครงสร้าง 'By the time + อดีตกาล (arrived)' ต้องใช้ Past Perfect Tense (had + V3) กับเหตุการณ์ที่เกิดขึ้นก่อนหน้านั้น จึงต้องใช้ 'had already started'"}, {"q": "Choose the correct sentence.", "choices": ["She is one of the best student in the class.", "She is one of the best students in the class.", "She is one of best students in the class.", "She is the one of best student in class."], "correct": 1, "answerLine": "Answer: She is one of the best students in the class.", "explain": "สำนวน 'one of the + adjective superlative + plural noun' ต้องใช้คำนามรูปพหูพจน์เสมอ จึงต้องใช้ 'students'"}, {"q": "Choose the correct conditional sentence: 'If she had studied harder, she ___ the exam.'", "choices": ["would pass", "would have passed", "will pass", "passed"], "correct": 1, "answerLine": "Answer: would have passed", "explain": "ประโยคเงื่อนไขแบบที่ 3 (สมมติที่ไม่เป็นจริงในอดีต) ใช้โครงสร้าง 'If + past perfect, would have + V3' จึงต้องใช้ 'would have passed'"}, {"q": "Choose the closest synonym of 'Enormous'.", "choices": ["Tiny", "Huge", "Average", "Narrow"], "correct": 1, "answerLine": "Answer: Huge", "explain": "'Enormous' หมายถึงมีขนาดใหญ่มาก ใกล้เคียงกับ 'Huge'"}, {"q": "Choose the closest antonym of 'Flexible'.", "choices": ["Adaptable", "Rigid", "Versatile", "Adjustable"], "correct": 1, "answerLine": "Answer: Rigid", "explain": "'Flexible' หมายถึงยืดหยุ่นปรับเปลี่ยนได้ คำตรงข้ามคือ 'Rigid' ซึ่งหมายถึงตายตัวไม่ยืดหยุ่น"}, {"q": "Water ___ at 100 degrees Celsius at sea level.", "choices": ["boil", "boils", "boiled", "is boiling"], "correct": 1, "answerLine": "Answer: boils", "explain": "ข้อเท็จจริงทางวิทยาศาสตร์ที่เป็นจริงเสมอต้องใช้ Present Simple Tense กับประธานเอกพจน์ คือ 'boils'"}]}, {"numerical": [{"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 9, 12, 18, 27, 39, ?", "choices": ["54", "56", "53", "55"], "correct": 0, "answerLine": "เฉลย: 54", "explain": "ผลต่างระหว่างพจน์คือ 3, 6, 9, 12 ตามลำดับ (เพิ่มขึ้นทีละ 3) ผลต่างถัดไปคือ 15 นำไปบวกกับ 39 จะได้ 39 + 15 = 54"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 5, 15, 45, 135, 405, ?", "choices": ["1218", "1212", "1013", "1215"], "correct": 3, "answerLine": "เฉลย: 1215", "explain": "แต่ละพจน์เกิดจากพจน์ก่อนหน้าคูณด้วย 3 ดังนั้นพจน์ถัดไปคือ 405 × 3 = 1215"}, {"q": "สินค้าราคา 1000 บาท ลดราคา 10% แล้วภายหลังปรับราคาขึ้นอีก 20% จากราคาที่ลดแล้ว ราคาสุดท้ายเป็นเท่าใด", "choices": ["1080 บาท", "1055 บาท", "1085 บาท", "1100 บาท"], "correct": 0, "answerLine": "เฉลย: 1080 บาท", "explain": "ลด 10% จาก 1000 = 1000 × 90/100 = 900 บาท จากนั้นปรับขึ้น 20% จากราคาที่ลดแล้ว = 900 × 120/100 = 1080 บาท (ข้อควรระวัง: ร้อยละที่สองคำนวณจากราคาใหม่ ไม่ใช่ราคาเดิม)"}, {"q": "นาย A ทำงานชิ้นหนึ่งเสร็จใน 4 วัน นาย B ทำงานชิ้นเดียวกันเสร็จใน 18 วัน ถ้าทั้งสองคนทำงานร่วมกัน จะเสร็จภายในกี่วัน", "choices": ["36/11 วัน", "37/11 วัน", "36/12 วัน", "22 วัน"], "correct": 0, "answerLine": "เฉลย: 36/11 วัน", "explain": "อัตราการทำงานของ A = 1/4 ของงานต่อวัน, ของ B = 1/18 ของงานต่อวัน รวมกัน = 1/4 + 1/18 = 11/36 ของงานต่อวัน ดังนั้นทำงานเสร็จใน 36/11 วัน"}, {"q": "นักเรียน 4 คน สอบได้คะแนนเฉลี่ย 70 คะแนน หากมีนักเรียนคนที่ 5 เข้ามาสอบและได้ 55 คะแนน คะแนนเฉลี่ยใหม่ของนักเรียนทั้ง 5 คนเป็นเท่าใด (ปัดเศษ 2 ตำแหน่ง)", "choices": ["70.0", "67.0", "66.0", "68.0"], "correct": 1, "answerLine": "เฉลย: 67.0", "explain": "คะแนนรวมเดิมของ 4 คน = 70 × 4 = 280 คะแนน เมื่อรวมคนที่ 5 ที่ได้ 55 คะแนน จะได้คะแนนรวม = 280 + 55 = 335 คะแนน หารด้วยจำนวนคน 5 คน = 335 ÷ 5 ≈ 67.0"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 1, 4, 9, 16, 25, ?", "choices": ["34", "35", "37", "36"], "correct": 3, "answerLine": "เฉลย: 36", "explain": "อนุกรมนี้คือกำลังสองของจำนวนนับ เรียงลำดับต่อเนื่องกัน ดังนั้นพจน์ถัดไปคือ 6² = 36"}, {"q": "พ่อค้าซื้อสินค้ามาในราคาทุน 800 บาท แล้วขายขาดทุน 12% ของราคาทุน ขายได้ในราคาเท่าใด", "choices": ["704 บาท", "744 บาท", "664 บาท", "800 บาท"], "correct": 0, "answerLine": "เฉลย: 704 บาท", "explain": "ขาดทุน 12% ของทุน 800 บาท = 800 × 12/100 = 96 บาท ราคาขาย = ทุน − ขาดทุน = 800 − 96 = 704 บาท"}, {"q": "แบ่งเงิน 300 บาท ให้แก่ A และ B ตามอัตราส่วน 2:3 A จะได้รับเงินกี่บาท", "choices": ["180 บาท", "120 บาท", "130 บาท", "110 บาท"], "correct": 1, "answerLine": "เฉลย: 120 บาท", "explain": "ผลรวมส่วน = 2+3 = 5 ส่วน เงิน 300 บาท ÷ 5 ส่วน = 60 บาทต่อส่วน A ได้ 2 ส่วน = 60 × 2 = 120 บาท"}, {"q": "รถยนต์คันหนึ่งวิ่งด้วยความเร็วคงที่ 45 กิโลเมตรต่อชั่วโมง เป็นเวลา 2.5 ชั่วโมง จะวิ่งได้ระยะทางเท่าใด", "choices": ["90 กิโลเมตร", "112.5 กิโลเมตร", "135 กิโลเมตร", "115 กิโลเมตร"], "correct": 1, "answerLine": "เฉลย: 112.5 กิโลเมตร", "explain": "ระยะทาง = อัตราเร็ว × เวลา = 45 × 2.5 = 112.5 กิโลเมตร"}, {"q": "ฝากเงิน 20000 บาท ที่อัตราดอกเบี้ยร้อยละ 4 ต่อปี (ดอกเบี้ยแบบคงต้น) เป็นเวลา 2 ปี จะได้ดอกเบี้ยรวมทั้งสิ้นเท่าใด", "choices": ["2400 บาท", "1600 บาท", "1800 บาท", "800 บาท"], "correct": 1, "answerLine": "เฉลย: 1600 บาท", "explain": "ดอกเบี้ยแบบคงต้น = เงินต้น × อัตราดอกเบี้ย × ระยะเวลา / 100 = 20000 × 4 × 2 / 100 = 1600 บาท"}, {"q": "ปัจจุบันพ่ออายุมากกว่าลูก 20 ปี ถ้าลูกอายุ 9 ปีในปัจจุบัน อีก 3 ปีข้างหน้าพ่อจะมีอายุเท่าใด", "choices": ["32 ปี", "12 ปี", "35 ปี", "30 ปี"], "correct": 0, "answerLine": "เฉลย: 32 ปี", "explain": "ปัจจุบันพ่ออายุ = 9 + 20 = 29 ปี อีก 3 ปีข้างหน้า พ่อจะอายุ 29 + 3 = 32 ปี"}, {"q": "ผสมสารละลายเข้มข้น 30% ปริมาณ 2 ลิตร กับสารละลายเข้มข้น 50% ปริมาณ 2 ลิตร จะได้สารละลายผสมมีความเข้มข้นร้อยละเท่าใด", "choices": ["40.0%", "37.0%", "35.0%", "45.0%"], "correct": 0, "answerLine": "เฉลย: 40.0%", "explain": "ปริมาณสารบริสุทธิ์รวม = (2×30) + (2×50) = 60 + 100 = 160 ปริมาตรรวม = 2+2 = 4 ลิตร ความเข้มข้น = 160/4 ≈ 40.0%"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 5, 16, 33, 56, 85, ?", "choices": ["120", "119", "122", "121"], "correct": 0, "answerLine": "เฉลย: 120", "explain": "ผลต่างของพจน์คือ 11, 17, 23, 29 และผลต่างของผลต่าง (ผลต่างชั้นที่ 2) คงที่เท่ากับ 6 ดังนั้นผลต่างถัดไปคือ 35 นำไปบวกกับ 85 จะได้ 85 + 35 = 120"}, {"q": "ถ้า 30% ของจำนวนหนึ่งเท่ากับ 40 จำนวนนั้นคือเท่าใด", "choices": ["12", "70", "143", "133"], "correct": 3, "answerLine": "เฉลย: 133", "explain": "ให้จำนวนนั้นคือ x จะได้ 30/100 × x = 40 ดังนั้น x = 40 × 100/30 = 133"}, {"q": "ท่อน้ำท่อหนึ่งสามารถสูบน้ำเข้าถังจนเต็มได้ในเวลา 4 ชั่วโมง ในขณะที่มีท่อระบายน้ำออกซึ่งจะทำให้น้ำในถังที่เต็มไหลออกจนหมดได้ในเวลา 8 ชั่วโมง ถ้าเปิดทั้งสองท่อพร้อมกัน น้ำจะเต็มถังในเวลากี่ชั่วโมง", "choices": ["9 ชั่วโมง", "12 ชั่วโมง", "8 ชั่วโมง", "7 ชั่วโมง"], "correct": 2, "answerLine": "เฉลย: 8 ชั่วโมง", "explain": "อัตราการสูบเข้า = 1/4 ของถังต่อชั่วโมง อัตราการไหลออก = 1/8 ของถังต่อชั่วโมง อัตราสุทธิ = 1/4 − 1/8 = 1/8 ของถังต่อชั่วโมง ดังนั้นน้ำจะเต็มถังในเวลา 8 ชั่วโมง"}, {"q": "หนังสือจำนวน 150 เล่ม ถูกแบ่งให้ห้องสมุด 2/5 ของจำนวนทั้งหมด ห้องสมุดจะได้รับหนังสือกี่เล่ม", "choices": ["55 เล่ม", "65 เล่ม", "60 เล่ม", "90 เล่ม"], "correct": 2, "answerLine": "เฉลย: 60 เล่ม", "explain": "หนังสือที่ห้องสมุดได้รับ = 150 × 2/5 = 60 เล่ม"}, {"q": "รถยนต์คันหนึ่งขับไปสถานที่แห่งหนึ่งด้วยความเร็วเฉลี่ย 50 กม./ชม. และขับกลับด้วยความเร็วเฉลี่ย 60 กม./ชม. โดยใช้เส้นทางเดิม ความเร็วเฉลี่ยตลอดการเดินทางไป-กลับเป็นเท่าใด (กม./ชม.)", "choices": ["49.5", "55", "54.5", "59.5"], "correct": 2, "answerLine": "เฉลย: 54.5  tollens: ถ้า P แล้ว Q, ไม่ใช่ Q ดังนั้นไม่ใช่ P เมื่อกำหนดว่า 'ถ้าไข้สูงเกิน 39 องศา ต้องไปพบแพทย์ทันที' และข้อเท็จจริงคือ 'คนไข้ไม่ต้องไปพบแพทย์ทันที' (ไม่ใช่ Q) จึงสรุปได้อย่างแน่นอนว่า 'ไข้ของคนไข้ไม่สูงเกิน 39 องศา' (ไม่ใช่ P)"}, {"q": "'สุรชัย' สูงกว่า 'มาลี' และ 'มาลี' สูงกว่า 'วีระ' ในขณะที่ 'ประยุทธ์' สูงกว่า 'สุรชัย' ใครเป็นคนที่สูงที่สุด", "choices": ["สุรชัย", "วีระ", "มาลี", "ประยุทธ์"], "correct": 3, "answerLine": "เฉลย: ประยุทธ์", "explain": "จากเงื่อนไข: ประยุทธ์ > สุรชัย > มาลี > วีระ (สูงกว่า) ดังนั้นเรียงลำดับความสูงจากมากไปน้อยคือ ประยุทธ์, สุรชัย, มาลี, วีระ จึงสรุปได้ว่า 'ประยุทธ์' เป็นคนที่สูงที่สุด"}, {"q": "'ธีระ' อายุมากกว่า 'วิชัย' อยู่ 6 ปี ถ้า 'วิชัย' อายุ 20 ปี 'ธีระ' จะมีอายุเท่าใด", "choices": ["20 ปี", "28 ปี", "24 ปี", "26 ปี"], "correct": 3, "answerLine": "เฉลย: 26 ปี", "explain": "'ธีระ' อายุมากกว่า 'วิชัย' อยู่ 6 ปี ดังนั้น ธีระ อายุ = 20 + 6 = 26 ปี"}, {"q": "จงเติมความสัมพันธ์ให้สมบูรณ์: ดินสอ : ไม้ = แก้วน้ำ : ?", "choices": ["พลาสติก", "โต๊ะ", "แก้ว", "น้ำ"], "correct": 2, "answerLine": "เฉลย: แก้ว", "explain": "ความสัมพันธ์คือ 'ดินสอ' กับ 'ไม้' เป็นคู่ที่แสดงหน้าที่/ลักษณะเฉพาะของกันและกัน เช่นเดียวกับ 'แก้วน้ำ' ที่ควรจับคู่กับ 'แก้ว' ตามรูปแบบความสัมพันธ์เดียวกัน"}, {"q": "ข้อใดต่อไปนี้ 'ไม่ได้' อยู่ในกลุ่มเดียวกับข้ออื่น: สามเหลี่ยม, สี่เหลี่ยม, วงกลม, ห้าเหลี่ยม", "choices": ["วงกลม", "สี่เหลี่ยม", "สามเหลี่ยม", "ห้าเหลี่ยม"], "correct": 0, "answerLine": "เฉลย: วงกลม", "explain": "สามเหลี่ยม สี่เหลี่ยม และห้าเหลี่ยม เป็นรูปหลายเหลี่ยมที่มีด้านตรง ส่วนวงกลมไม่มีด้าน จึงแตกต่างจากพวก"}, {"q": "ถ้าวันนี้เป็นวันพุธ อีก 37 วันข้างหน้าจะตรงกับวันใด", "choices": ["วันอาทิตย์", "วันศุกร์", "วันเสาร์", "วันจันทร์"], "correct": 1, "answerLine": "เฉลย: วันศุกร์", "explain": "37 หารด้วย 7 (จำนวนวันในสัปดาห์) เหลือเศษ 2 วัน นับจากวันพุธไปอีก 2 วัน จะตรงกับวันศุกร์"}, {"q": "กำหนดรหัส: ถ้า 'DOG' เขียนแทนด้วยรหัส '132' (โดยกำหนดตัวเลขแทนตัวอักษรแต่ละตัวตามลำดับตัวอักษรที่ปรากฏ) คำว่า 'GOD' จะเขียนแทนด้วยรหัสใด", "choices": ["231", "2312", "2317", "132"], "correct": 0, "answerLine": "เฉลย: 231", "explain": "กำหนดให้ตัวอักษรแต่ละตัวใน 'DOG' แทนด้วยตัวเลขตามลำดับที่ปรากฏ คือ D=1, G=2, O=3 เมื่อเรียงตามคำว่า 'GOD' จะได้รหัส '231'"}, {"q": "'อรุณี' นั่งทางซ้ายของ 'สมชาย' และ 'สมชาย' นั่งทางซ้ายของ 'วิชัย' ส่วน 'วีระ' นั่งทางขวาของ 'วิชัย' และ 'มาลี' นั่งทางขวาสุด ถ้าเรียงจากซ้ายไปขวา ใครนั่งอยู่ตรงกลาง", "choices": ["สมชาย", "วีระ", "วิชัย", "อรุณี"], "correct": 2, "answerLine": "เฉลย: วิชัย", "explain": "เรียงลำดับจากซ้ายไปขวาได้ดังนี้: อรุณี, สมชาย, วิชัย, วีระ, มาลี ตำแหน่งตรงกลาง (คนที่ 3 จาก 5 คน) คือ 'วิชัย'"}, {"q": "กำหนดข้อความ 1: 'รถทุกคันในโรงจอดนี้ต้องติดสติกเกอร์' และข้อความ 2: 'รถที่ติดสติกเกอร์ทุกคันผ่านการตรวจสภาพแล้ว' ข้อสรุปใดถูกต้องตามหลักตรรกะ", "choices": ["รถทุกคันในโรงจอดนี้ผ่านการตรวจสภาพแล้ว", "สรุปไม่ได้จากข้อความทั้งสอง", "ไม่มีความเกี่ยวข้องกันระหว่างสองข้อความ", "ข้อความทั้งสองขัดแย้งกันเอง"], "correct": 0, "answerLine": "เฉลย: รถทุกคันในโรงจอดนี้ผ่านการตรวจสภาพแล้ว", "explain": "เป็นการอนุมานแบบลูกโซ่ (chain syllogism): ถ้า A แล้ว B (ข้อความ 1) และถ้า B แล้ว C (ข้อความ 2) ดังนั้น A แล้ว C จึงสรุปได้ว่า 'รถทุกคันในโรงจอดนี้ผ่านการตรวจสภาพแล้ว'"}, {"q": "เวลา 2:00 น. มุมที่เล็กกว่าระหว่างเข็มชั่วโมงกับเข็มนาทีของนาฬิกามีค่ากี่องศา", "choices": ["60 องศา", "120 องศา", "90 องศา", "30 องศา"], "correct": 0, "answerLine": "เฉลย: 60 องศา", "explain": "เข็มนาทีชี้ที่เลข 12 (0 องศา) ส่วนเข็มชั่วโมงชี้ที่เลข 2 แต่ละชั่วโมงห่างกัน 30 องศา (360÷12) มุมดิบระหว่างเข็ม = 2 × 30 = 60 องศา แต่โจทย์ถามหามุมที่เล็กกว่า (ไม่เกิน 180 องศา) จึงต้องนำ 360 − 60 มาเปรียบเทียบด้วยหากมุมดิบเกิน 180 องศา คำตอบคือ 60 องศา"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 3, 1, 4, 5, 9, ?", "choices": ["14", "15", "13", "23"], "correct": 0, "answerLine": "เฉลย: 14", "explain": "อนุกรมนี้แต่ละพจน์เกิดจากผลบวกของสองพจน์ก่อนหน้า (คล้ายอนุกรมฟีโบนัชชี) เช่น 3+1=4, 1+4=5 ดังนั้นพจน์ถัดไป = 5+9 = 14"}, {"q": "ครอบครัวหนึ่งมีลูกชาย 2 คน และลูกสาว 2 คน แต่ละคนมีพี่น้องรวมกันทั้งหมดกี่คน (นับทุกคนในครอบครัวรวมกัน)", "choices": ["4 คน", "3 คน", "6 คน", "5 คน"], "correct": 0, "answerLine": "เฉลย: 4 คน", "explain": "จำนวนบุตรทั้งหมดในครอบครัว = ลูกชาย 2 คน + ลูกสาว 2 คน = 4 คน"}, {"q": "จงเติมความสัมพันธ์ให้สมบูรณ์: นิ้ว : มือ = กลีบ : ?", "choices": ["ดอกไม้", "ราก", "ใบไม้", "ต้นไม้"], "correct": 0, "answerLine": "เฉลย: ดอกไม้", "explain": "ความสัมพันธ์คือ 'นิ้ว' เป็นส่วนประกอบย่อยหนึ่งของ 'มือ' (ส่วน-ทั้งหมด) เช่นเดียวกับ 'กลีบ' ที่เป็นส่วนประกอบย่อยของ 'ดอกไม้' ตามรูปแบบความสัมพันธ์เดียวกัน"}, {"q": "'สมหญิง' เป็นพี่สาวของ 'มาลี' และ 'มาลี' แต่งงานกับ 'จิรา' แล้ว 'สมหญิง' มีความสัมพันธ์อย่างไรกับ 'จิรา'", "choices": ["แม่", "น้องสาว", "ไม่มีความเกี่ยวข้องกัน", "พี่สะใภ้/พี่ภรรยา (ญาติทางฝ่ายคู่สมรส)"], "correct": 3, "answerLine": "เฉลย: พี่สะใภ้/พี่ภรรยา (ญาติทางฝ่ายคู่สมรส)", "explain": "เนื่องจาก สมหญิง เป็นพี่สาวของ มาลี และ มาลี แต่งงานกับ จิรา ดังนั้น สมหญิง จึงกลายเป็นญาติของ จิรา ทางฝ่ายคู่สมรส มีสถานะเป็นพี่สาวของสามี/ภรรยา ซึ่งนับเป็นความสัมพันธ์ทางเครือญาติโดยการสมรส"}], "thai": [{"q": "สำนวนไทย 'ไก่งามเพราะขน คนงามเพราะแต่ง' มีความหมายตรงกับข้อใด", "choices": ["รูปลักษณ์ภายนอกไม่มีความสำคัญ", "ความสวยงามอยู่ที่จิตใจเท่านั้น", "คนดีต้องพิสูจน์ด้วยการกระทำ", "คนเราจะดูดีได้เพราะการแต่งกายหรือปรุงแต่งภายนอก"], "correct": 3, "answerLine": "เฉลย: คนเราจะดูดีได้เพราะการแต่งกายหรือปรุงแต่งภายนอก", "explain": "เปรียบกับไก่ที่ดูสวยงามเพราะขนที่สวย เช่นเดียวกับคนที่ดูดีขึ้นได้เพราะการแต่งกายหรือตกแต่งตัว"}, {"q": "คำว่า 'พระกรรณ' เป็นคำราชาศัพท์ที่มีความหมายตรงกับข้อใด", "choices": ["ปาก", "จมูก", "หู", "ตา"], "correct": 2, "answerLine": "เฉลย: หู", "explain": "'พระกรรณ' เป็นคำราชาศัพท์หมวดอวัยวะ หมายถึง 'หู' ของพระมหากษัตริย์และพระราชวงศ์"}, {"q": "คำในข้อใดสะกดถูกต้องตามหลักภาษาไทย", "choices": ["เจริญ", "เจิรญ", "เจิญ", "เจรีญ"], "correct": 0, "answerLine": "เฉลย: เจริญ", "explain": "คำว่า 'เจริญ' สะกดโดยเรียงพยัญชนะและสระเป็น จ-เ-ร-ิ-ญ ตามลำดับที่ถูกต้อง"}, {"q": "คำว่า 'วิปโยค' มีความหมายตรงกับข้อใด", "choices": ["การพลัดพราก ความทุกข์โศก", "ความสุขสันต์", "การรวมตัวกัน", "ความสงบสุข"], "correct": 0, "answerLine": "เฉลย: การพลัดพราก ความทุกข์โศก", "explain": "'วิปโยค' หมายถึงการพลัดพรากจากกันหรือความทุกข์โศกเศร้าจากการสูญเสีย"}, {"q": "สำนวนไทย 'รำไม่ดีโทษปี่โทษกลอง' มีความหมายตรงกับข้อใด", "choices": ["ทำผิดแล้วไม่ยอมรับ กลับโทษผู้อื่นหรือสิ่งอื่น", "ทำงานร่วมกันอย่างมีความสุข", "แบ่งหน้าที่กันทำงานอย่างเหมาะสม", "ยอมรับความผิดของตนเองอย่างตรงไปตรงมา"], "correct": 0, "answerLine": "เฉลย: ทำผิดแล้วไม่ยอมรับ กลับโทษผู้อื่นหรือสิ่งอื่น", "explain": "เปรียบกับคนรำที่รำไม่ดีแต่กลับโทษว่าเสียงปี่พาทย์ไม่เข้าจังหวะ แทนที่จะยอมรับความผิดของตนเอง"}, {"q": "ประโยค 'นักเรียนทุกคนควรจะต้องประพฤติตนให้ดี' มีปัญหาการใช้ภาษาในลักษณะใด", "choices": ["ใช้คำฟุ่มเฟือย ('ควรจะต้อง' ซ้ำซ้อน)", "ใช้คำผิดความหมาย", "เรียงประโยคผิดลำดับ", "ใช้คำราชาศัพท์ผิด"], "correct": 0, "answerLine": "เฉลย: ใช้คำฟุ่มเฟือย ('ควรจะต้อง' ซ้ำซ้อน)", "explain": "คำว่า 'ควร' และ 'ต้อง' มีน้ำหนักความหมายต่างกัน (ควร=แนะนำ, ต้อง=บังคับ) การใช้ควบกันเป็น 'ควรจะต้อง' ทำให้ความหมายกำกวมและฟุ่มเฟือย ควรเลือกใช้เพียงคำเดียว"}, {"q": "เขาขยันเรียนมาก ___ สอบตก", "choices": ["และ", "เพราะ", "แต่", "จึง"], "correct": 2, "answerLine": "เฉลย: แต่", "explain": "ประโยคนี้แสดงความขัดแย้งระหว่างเหตุ (ขยันเรียน) กับผลที่ไม่คาดคิด (สอบตก) จึงต้องใช้คำเชื่อมแสดงความขัดแย้งคือ 'แต่'"}, {"q": "'เขาพูดเก่ง' คำว่า 'เก่ง' ทำหน้าที่ขยายคำใดในประโยคนี้", "choices": ["เขา", "พูด", "ไม่มีคำที่ถูกขยาย", "เป็นประธานของประโยค"], "correct": 1, "answerLine": "เฉลย: พูด", "explain": "คำว่า 'เก่ง' ในที่นี้ขยายกริยา 'พูด' โดยบอกลักษณะอาการของการพูด จึงทำหน้าที่เป็นคำวิเศษณ์ขยายคำกริยา"}, {"q": "คำตรงข้ามของ 'มานะ' (ความพยายาม) คือข้อใด", "choices": ["อุตสาหะ", "ท้อแท้", "บากบั่น", "ขยัน"], "correct": 1, "answerLine": "เฉลย: ท้อแท้", "explain": "'มานะ' หมายถึงความพยายามอดทนไม่ย่อท้อ คำตรงข้ามคือ 'ท้อแท้' ซึ่งหมายถึงหมดกำลังใจ ไม่มีความพยายามต่อ"}, {"q": "คำในข้อใดสะกดถูกต้องตามหลักภาษาไทย", "choices": ["ทฤษฎี", "ทฤษฎีย์", "ทริษฎี", "ทฤษฏี"], "correct": 0, "answerLine": "เฉลย: ทฤษฎี", "explain": "คำว่า 'ทฤษฎ , "at", "with"], "correct": 0, "answerLine": "Answer: in", "explain": "สำนวน 'invest in' ใช้บอกการลงทุนในสิ่งใดสิ่งหนึ่ง จึงต้องใช้ 'in'"}, {"q": "Please ___ the form before submitting it.", "choices": ["fill out", "fill up", "fill in with", "fill on"], "correct": 0, "answerLine": "Answer: fill out", "explain": "สำนวน 'fill out' หมายถึงกรอกแบบฟอร์มให้ครบถ้วน เป็นสำนวนที่ใช้บ่อยในภาษาอังกฤษแบบทางการ (fill in ก็ใช้ได้เช่นกัน แต่ 'fill out' เป็นตัวเลือกที่ถูกต้องที่สุดในที่นี้)"}, {"q": "She always ___ her promises, no matter what.", "choices": ["keeps", "holds", "maintains", "carries"], "correct": 0, "answerLine": "Answer: keeps", "explain": "สำนวน 'keep one's promise' หมายถึงรักษาคำมั่นสัญญา เป็นสำนวนตายตัวที่ใช้คำว่า 'keep'"}, {"q": "She had to ___ several obstacles before achieving success.", "choices": ["overcome", "avoid", "create", "ignore"], "correct": 0, "answerLine": "Answer: overcome", "explain": "'Overcome' หมายถึงเอาชนะหรือฝ่าฟันอุปสรรค ตรงกับบริบทของการประสบความสำเร็จหลังเผชิญปัญหา"}, {"q": "I ___ this book since last month, and I still haven't finished it.", "choices": ["read", "have been reading", "am reading", "was reading"], "correct": 1, "answerLine": "Answer: have been reading", "explain": "เหตุการณ์เริ่มในอดีตและดำเนินต่อเนื่องมาถึงปัจจุบัน (since last month) พร้อมเน้นความต่อเนื่อง ต้องใช้ Present Perfect Continuous คือ 'have been reading'"}, {"q": "The meeting was postponed ___ next Friday.", "choices": ["until", "since", "by", "for"], "correct": 0, "answerLine": "Answer: until", "explain": "เมื่อต้องการบอกว่าเหตุการณ์ถูกเลื่อนออกไปจนถึงเวลาใดเวลาหนึ่งในอนาคต ต้องใช้ 'until' (จนกว่าจะถึง)"}, {"q": "The meeting has been ___ due to unforeseen circumstances.", "choices": ["put off", "put on", "put up", "put out"], "correct": 0, "answerLine": "Answer: put off", "explain": "สำนวน 'put off' หมายถึงเลื่อนออกไป (postpone) ตรงกับบริบทของการเลื่อนการประชุม"}, {"q": "The workers ___ the bridge for over a year before it collapsed.", "choices": ["were building", "had been building", "have been building", "build"], "correct": 1, "answerLine": "Answer: had been building", "explain": "เหตุการณ์ที่ดำเนินต่อเนื่องมาก่อนอีกเหตุการณ์หนึ่งในอดีต (before it collapsed) โดยเน้นความต่อเนื่อง ต้องใช้ Past Perfect Continuous คือ 'had been building'"}, {"q": "Choose the correct sentence.", "choices": ["It is important that he attends the meeting.", "It is important that he attend the meeting.", "It is important that he attending the meeting.", "It is important him to attend the meeting."], "correct": 1, "answerLine": "Answer: It is important that he attend the meeting.", "explain": "โครงสร้าง 'It is important that + subject + verb (base form)' เป็น subjunctive mood ซึ่งไม่ผันกริยาตามประธาน จึงต้องใช้ 'attend' โดยไม่เติม -s"}, {"q": "The committee will ___ the proposal next week.", "choices": ["review", "destroy", "abandon", "dismiss entirely without reading"], "correct": 0, "answerLine": "Answer: review", "explain": "'Review' หมายถึงพิจารณาทบทวนอย่างรอบคอบ ตรงกับบริบทของการพิจารณาข้อเสนอ"}, {"q": "At this time tomorrow, we ___ on a plane to London.", "choices": ["will be flying", "fly", "flew", "have flown"], "correct": 0, "answerLine": "Answer: will be flying", "explain": "เหตุการณ์ที่กำลังดำเนินอยู่ในช่วงเวลาหนึ่งในอนาคต ต้องใช้ Future Continuous คือ 'will be flying'"}, {"q": "Choose the closest antonym of 'Scarce'.", "choices": ["Rare", "Limited", "Abundant", "Expensive"], "correct": 2, "answerLine": "Answer: Abundant", "explain": "'Scarce' หมายถึงหายากหรือมีน้อย คำตรงข้ามคือ 'Abundant' ซึ่งหมายถึงมีมากมาย"}, {"q": "Choose the closest antonym of 'Superior'.", "choices": ["Excellent", "Inferior", "Dominant", "Advanced"], "correct": 1, "answerLine": "Answer: Inferior", "explain": "'Superior' หมายถึงเหนือกว่าหรือดีกว่า คำตรงข้ามคือ 'Inferior' ซึ่งหมายถึงด้อยกว่า"}, {"q": "Choose the closest synonym of 'Reluctant'.", "choices": ["Eager", "Unwilling", "Excited", "Ready"], "correct": 1, "answerLine": "Answer: Unwilling", "explain": "'Reluctant' หมายถึงลังเลไม่เต็มใจ ใกล้เคียงกับ 'Unwilling'"}, {"q": "She has lived in Bangkok ___ 2015.", "choices": ["for", "since", "from", "during"], "correct": 1, "answerLine": "Answer: since", "explain": "เมื่อระบุจุดเริ่มต้นของเวลาที่แน่นอน (a specific point in time) ต้องใช้ 'since' ส่วน 'for' ใช้กับช่วงระยะเวลา"}, {"q": "She ___ her keys, so she couldn't get into the house.", "choices": ["lost", "had lost", "has lost", "loses"], "correct": 1, "answerLine": "Answer: had lost", "explain": "เหตุการณ์ที่เกิดขึ้นก่อนผลลัพธ์ในอดีต (couldn't get in) ต้องใช้ Past Perfect Tense คือ 'had lost'"}, {"q": "Choose the correct sentence.", "choices": ["Not only he is smart but also hardworking.", "Not only is he smart but also hardworking.", "Not only he smart but also hardworking.", "He not only is smart but also hardworking."], "correct": 1, "answerLine": "Answer: Not only is he smart but also hardworking.", "explain": "เมื่อขึ้นต้นประโยคด้วย 'Not only' ต้องมีการสลับตำแหน่งกริยาช่วยกับประธาน (inversion) จึงต้องใช้ 'Not only is he smart...'"}]}, {"numerical": [{"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 8, 10, 13, 17, 22, ?", "choices": ["28", "29", "27", "30"], "correct": 0, "answerLine": "เฉลย: 28", "explain": "ผลต่างระหว่างพจน์คือ 2, 3, 4, 5 ตามลำดับ (เพิ่มขึ้นทีละ 1) ผลต่างถัดไปคือ 6 นำไปบวกกับ 22 จะได้ 22 + 6 = 28"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 2, 6, 18, 54, 162, ?", "choices": ["405", "486", "489", "483"], "correct": 1, "answerLine": "เฉลย: 486", "explain": "แต่ละพจน์เกิดจากพจน์ก่อนหน้าคูณด้วย 3 ดังนั้นพจน์ถัดไปคือ 162 × 3 = 486"}, {"q": "สินค้าราคา 1000 บาท ลดราคา 25% แล้วภายหลังปรับราคาขึ้นอีก 10% จากราคาที่ลดแล้ว ราคาสุดท้ายเป็นเท่าใด", "choices": ["850 บาท", "830 บาท", "825 บาท", "845 บาท"], "correct": 2, "answerLine": "เฉลย: 825 บาท", "explain": "ลด 25% จาก 1000 = 1000 × 75/100 = 750 บาท จากนั้นปรับขึ้น 10% จากราคาที่ลดแล้ว = 750 × 110/100 = 825 บาท (ข้อควรระวัง: ร้อยละที่สองคำนวณจากราคาใหม่ ไม่ใช่ราคาเดิม)"}, {"q": "นาย A ทำงานชิ้นหนึ่งเสร็จใน 4 วัน น กความสามารถหรือความชำนาญในเรื่องใดเรื่องหนึ่ง จึงต้องใช้ 'at'"}, {"q": "Choose the closest synonym of 'Ancient'.", "choices": ["Modern", "Antique", "New", "Recent"], "correct": 1, "answerLine": "Answer: Antique", "explain": "'Ancient' หมายถึงเก่าแก่โบราณ ใกล้เคียงกับ 'Antique' ที่หมายถึงของเก่าแก่มีคุณค่า"}, {"q": "I'm looking forward ___ hearing from you soon.", "choices": ["to", "for", "on", "at"], "correct": 0, "answerLine": "Answer: to", "explain": "สำนวน 'look forward to' ตามด้วยคำนามหรือ gerund (V-ing) เสมอ จึงต้องใช้ 'to hearing'"}, {"q": "He arrived ___ the airport two hours early.", "choices": ["at", "in", "on", "to"], "correct": 0, "answerLine": "Answer: at", "explain": "เมื่อกล่าวถึงสถานที่เฉพาะจุด เช่น สนามบิน มักใช้ 'at' คู่กับ 'arrive' (arrive at + สถานที่เล็ก/จุด, arrive in + เมือง/ประเทศ)"}, {"q": "Choose the correct passive voice: 'English ___ in many countries around the world.'", "choices": ["speaks", "is spoken", "speak", "was spoken"], "correct": 1, "answerLine": "Answer: is spoken", "explain": "ข้อเท็จจริงทั่วไปในรูป passive voice ของ present simple tense ใช้โครงสร้าง 'is/are + V3' จึงต้องใช้ 'is spoken'"}, {"q": "She apologized ___ being late for the meeting.", "choices": ["for", "to", "about", "of"], "correct": 0, "answerLine": "Answer: for", "explain": "สำนวน 'apologize for + doing something' ใช้บอกสาเหตุที่ขอโทษ จึงต้องใช้ 'for'"}, {"q": "If I ___ more time, I would travel around the world.", "choices": ["have", "had", "will have", "having"], "correct": 1, "answerLine": "Answer: had", "explain": "ประโยคเงื่อนไขแบบที่ 2 (สมมติที่ไม่เป็นจริงในปัจจุบัน) ใช้โครงสร้าง 'If + past simple, would + verb' จึงต้องใช้ 'had'"}, {"q": "She was accused ___ stealing company funds.", "choices": ["of", "for", "with", "about"], "correct": 0, "answerLine": "Answer: of", "explain": "สำนวน 'accuse someone of + doing something' ใช้บอกข้อกล่าวหา จึงต้องใช้ 'of'"}, {"q": "The Earth ___ around the Sun.", "choices": ["revolves", "revolved", "is revolving", "will revolve"], "correct": 0, "answerLine": "Answer: revolves", "explain": "ข้อเท็จจริงทางวิทยาศาสตร์ที่เป็นจริงเสมอต้องใช้ Present Simple Tense คือ 'revolves'"}, {"q": "Choose the closest antonym of 'Cautious'.", "choices": ["Careful", "Reckless", "Attentive", "Alert"], "correct": 1, "answerLine": "Answer: Reckless", "explain": "'Cautious' หมายถึงระมัดระวัง คำตรงข้ามคือ 'Reckless' ซึ่งหมายถึงประมาทไม่ระมัดระวัง"}, {"q": "The train departs ___ 9 o'clock sharp.", "choices": ["at", "in", "on", "by"], "correct": 0, "answerLine": "Answer: at", "explain": "เมื่อกล่าวถึงเวลานาฬิกาที่แน่นอน (a specific clock time) ต้องใช้ 'at' เสมอ"}, {"q": "Choose the closest synonym of 'Reveal'.", "choices": ["Hide", "Disclose", "Cover", "Ignore"], "correct": 1, "answerLine": "Answer: Disclose", "explain": "'Reveal' หมายถึงเปิดเผยให้เห็น ใกล้เคียงกับ 'Disclose'"}]}, {"numerical": [{"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 5, 7, 10, 14, 19, ?", "choices": ["27", "24", "25", "26"], "correct": 2, "answerLine": "เฉลย: 25", "explain": "ผลต่างระหว่างพจน์คือ 2, 3, 4, 5 ตามลำดับ (เพิ่มขึ้นทีละ 1) ผลต่างถัดไปคือ 6 นำไปบวกกับ 19 จะได้ 19 + 6 = 25"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 4, 8, 16, 32, 64, ?", "choices": ["96", "126", "128", "130"], "correct": 2, "answerLine": "เฉลย: 128", "explain": "แต่ละพจน์เกิดจากพจน์ก่อนหน้าคูณด้วย 2 ดังนั้นพจน์ถัดไปคือ 64 × 2 = 128"}, {"q": "สินค้าราคา 600 บาท ลดราคา 10% แล้วภายหลังปรับราคาขึ้นอีก 10% จากราคาที่ลดแล้ว ราคาสุดท้ายเป็นเท่าใด", "choices": ["599 บาท", "594 บาท", "600 บาท", "614 บาท"], "correct": 1, "answerLine": "เฉลย: 594 บาท", "explain": "ลด 10% จาก 600 = 600 × 90/100 = 540 บาท จากนั้นปรับขึ้น 10% จากราคาที่ลดแล้ว = 540 × 110/100 = 594 บาท (ข้อควรระวัง: ร้อยละที่สองคำนวณจากราคาใหม่ ไม่ใช่ราคาเดิม)"}, {"q": "นาย A ทำงานชิ้นหนึ่งเสร็จใน 10 วัน นาย B ทำงานชิ้นเดียวกันเสร็จใน 9 วัน ถ้าทั้งสองคนทำงานร่วมกัน จะเสร็จภายในกี่วัน", "choices": ["91/19 วัน", "19 วัน", "90/20 วัน", "90/19 วัน"], "correct": 3, "answerLine": "เฉลย: 90/19 วัน", "explain": "อัตร  couldn't ___ what she was trying to say.", "choices": ["figure out", "figure in", "figure up", "figure on"], "correct": 0, "answerLine": "Answer: figure out", "explain": "สำนวน 'figure out' หมายถึงทำความเข้าใจหรือคิดออกว่าสิ่งใดหมายถึงอะไร"}, {"q": "Choose the closest synonym of 'Diligent'.", "choices": ["Lazy", "Hardworking", "Careless", "Talented"], "correct": 1, "answerLine": "Answer: Hardworking", "explain": "'Diligent' หมายถึงขยันขันแข็ง มุ่งมั่นในการทำงาน ใกล้เคียงกับ 'Hardworking' มากที่สุด"}, {"q": "The company had to ___ 200 employees due to budget cuts.", "choices": ["lay off", "lay down", "lay out", "lay on"], "correct": 0, "answerLine": "Answer: lay off", "explain": "สำนวน 'lay off' หมายถึงเลิกจ้างพนักงานเนื่องจากเหตุผลด้านธุรกิจ เช่น การลดงบประมาณ"}, {"q": "I usually ___ coffee in the morning, but today I ___ tea.", "choices": ["drink / am drinking", "drink / drink", "am drinking / drink", "drank / am drinking"], "correct": 0, "answerLine": "Answer: drink / am drinking", "explain": "ความเคยชินทั่วไปใช้ Present Simple ('drink') ในขณะที่เหตุการณ์ที่กำลังเกิดขึ้นในขณะนี้ (วันนี้) ใช้ Present Continuous ('am drinking')"}, {"q": "Choose the correct sentence.", "choices": ["He suggested me to go home.", "He suggested that I go home.", "He suggested to me go home.", "He suggested going I home."], "correct": 1, "answerLine": "Answer: He suggested that I go home.", "explain": "คำกริยา 'suggest' ตามด้วย 'that + subject + verb (base form)' หรือ gerund ไม่สามารถตามด้วย 'someone + to V' ได้ ประโยคที่ถูกต้องคือ 'He suggested that I go home.'"}, {"q": "Choose the correct conditional sentence: 'If it rains tomorrow, we ___ the picnic.'", "choices": ["would cancel", "cancel", "will cancel", "canceled"], "correct": 2, "answerLine": "Answer: will cancel", "explain": "ประโยคเงื่อนไขแบบที่ 1 (เหตุการณ์ที่อาจเกิดขึ้นได้จริงในอนาคต) ใช้โครงสร้าง 'If + present simple, will + verb' จึงต้องใช้ 'will cancel'"}, {"q": "Choose the correct passive voice: 'The bridge ___ by the end of next year.'", "choices": ["will complete", "will be completed", "completes", "is completing"], "correct": 1, "answerLine": "Answer: will be completed", "explain": "เหตุการณ์ในอนาคตที่อยู่ในรูป passive voice ใช้โครงสร้าง 'will be + V3' จึงต้องใช้ 'will be completed'"}, {"q": "Choose the correct passive voice: 'This house ___ in 1990.'", "choices": ["built", "was built", "is built", "has built"], "correct": 1, "answerLine": "Answer: was built", "explain": "เหตุการณ์ที่เกิดขึ้นและสิ้นสุดแล้วในอดีตพร้อมระบุเวลาชัดเจน (1990) ในรูป passive ใช้ 'was + V3' จึงต้องใช้ 'was built'"}, {"q": "Choose the correct sentence.", "choices": ["The number of students are increasing.", "The number of students is increasing.", "A number of students is increasing.", "The number of student are increasing."], "correct": 1, "answerLine": "Answer: The number of students is increasing.", "explain": "'The number of + plural noun' ทำหน้าที่เป็นประธานเอกพจน์ (หมายถึง 'จำนวน' ซึ่งเป็นสิ่งเดียว) จึงต้องใช้กริยาเอกพจน์ 'is'"}, {"q": "She ___ to Japan three times so far.", "choices": ["went", "has gone", "had gone", "was going"], "correct": 1, "answerLine": "Answer: has gone", "explain": "ประสบการณ์ที่เกิดขึ้นในอดีตจนถึงปัจจุบันโดยไม่ระบุเวลาที่แน่นอน (so far) ต้องใช้ Present Perfect Tense คือ 'has gone'"}, {"q": "We need to ___ this problem as soon as possible.", "choices": ["look into", "look up", "look after", "look on"], "correct": 0, "answerLine": "Answer: look into", "explain": "สำนวน 'look into' หมายถึงตรวจสอบหรือสืบสวนปัญหาอย่างละเอียด"}]}, {"numerical": [{"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 3, 8, 14, 21, 29, ?", "choices": ["38", "40", "39", "37"], "correct": 0, "answerLine": "เฉลย: 38", "explain": "ผลต่างระหว่างพจน์คือ 5, 6, 7, 8 ตามลำดับ (เพิ่มขึ้นทีละ 1) ผลต่างถัดไปคือ 9 นำไปบวกกับ 29 จะได้ 29 + 9 = 38"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 4, 12, 36, 108, 324, ?", "choices": ["972", "975", "810", "969"], "correct": 0, "answerLine": "เฉลย: 972", "explain": "แต่ละพจน์เกิดจ มายถึงยอมรับ"}, {"q": "The workers ___ the road for six months before it was finally finished.", "choices": ["had been repairing", "were repairing", "have repaired", "repair"], "correct": 0, "answerLine": "Answer: had been repairing", "explain": "เหตุการณ์ที่ดำเนินต่อเนื่องมาก่อนอีกเหตุการณ์หนึ่งในอดีต (before it was finished) โดยเน้นความต่อเนื่อง ต้องใช้ Past Perfect Continuous คือ 'had been repairing'"}, {"q": "Choose the correct sentence.", "choices": ["Neither of the answers are correct.", "Neither of the answers is correct.", "Neither of the answer is correct.", "Neither of the answers were correct they."], "correct": 1, "answerLine": "Answer: Neither of the answers is correct.", "explain": "'Neither of + plural noun' ทำหน้าที่เป็นประธานเอกพจน์เสมอในหลักไวยากรณ์ทางการ จึงต้องใช้กริยาเอกพจน์ 'is'"}, {"q": "She had to ___ her old habits to succeed in her new job.", "choices": ["give up", "give in", "give away", "give out"], "correct": 0, "answerLine": "Answer: give up", "explain": "สำนวน 'give up' หมายถึงเลิกทำสิ่งใดสิ่งหนึ่ง (เช่น เลิกนิสัยเดิม)"}, {"q": "Choose the closest antonym of 'Permanent'.", "choices": ["Lasting", "Temporary", "Fixed", "Stable"], "correct": 1, "answerLine": "Answer: Temporary", "explain": "'Permanent' หมายถึงถาวรไม่เปลี่ยนแปลง คำตรงข้ามคือ 'Temporary' ซึ่งหมายถึงชั่วคราว"}, {"q": "By the age of 30, she ___ three companies.", "choices": ["will start", "had started", "has started", "will have started"], "correct": 3, "answerLine": "Answer: will have started", "explain": "เหตุการณ์ที่จะสำเร็จก่อนถึงช่วงเวลาหนึ่งในอนาคต (by the age of 30) ต้องใช้ Future Perfect Tense คือ 'will have started'"}, {"q": "She is interested ___ learning new languages.", "choices": ["in", "at", "on", "for"], "correct": 0, "answerLine": "Answer: in", "explain": "สำนวน 'interested in' ใช้บอกความสนใจในสิ่งใดสิ่งหนึ่ง จึงต้องใช้ 'in'"}, {"q": "Choose the closest antonym of 'Fluent'.", "choices": ["Skilled", "Halting", "Smooth", "Proficient"], "correct": 1, "answerLine": "Answer: Halting", "explain": "'Fluent' หมายถึงพูดหรือใช้ภาษาได้อย่างคล่องแคล่ว คำตรงข้ามคือ 'Halting' ซึ่งหมายถึงพูดติดขัดไม่คล่อง"}, {"q": "Choose the correct passive voice: 'The window ___ by the strong wind last night.'", "choices": ["broke", "was broken", "is broken", "has broken"], "correct": 1, "answerLine": "Answer: was broken", "explain": "เหตุการณ์ในรูป passive voice ของ past simple tense (มีคำบอกเวลา 'last night') ใช้โครงสร้าง 'was/were + V3' จึงต้องใช้ 'was broken'"}, {"q": "Choose the closest antonym of 'Humble'.", "choices": ["Modest", "Arrogant", "Shy", "Polite"], "correct": 1, "answerLine": "Answer: Arrogant", "explain": "'Humble' หมายถึงถ่อมตัว คำตรงข้ามคือ 'Arrogant' ซึ่งหมายถึงหยิ่งยโส"}, {"q": "Choose the closest synonym of 'Peculiar'.", "choices": ["Ordinary", "Unusual", "Common", "Typical"], "correct": 1, "answerLine": "Answer: Unusual", "explain": "'Peculiar' หมายถึงแปลกประหลาดผิดปกติ ใกล้เคียงกับ 'Unusual'"}, {"q": "Choose the closest synonym of 'Compassion'.", "choices": ["Cruelty", "Sympathy", "Indifference", "Anger"], "correct": 1, "answerLine": "Answer: Sympathy", "explain": "'Compassion' หมายถึงความเห็นอกเห็นใจ ใกล้เคียงกับ 'Sympathy'"}, {"q": "Choose the correct sentence.", "choices": ["Every one of the players were tired.", "Every one of the players was tired.", "Every one of the player was tired.", "Every one of the players is tired."], "correct": 1, "answerLine": "Answer: Every one of the players was tired.", "explain": "'Every one of + plural noun' ทำหน้าที่เป็นประธานเอกพจน์เสมอ กริยาจึงต้องผันตามเอกพจน์ในรูปอดีต คือ 'was'"}, {"q": "She is worried ___ her upcoming exam results.", "choices": ["about", "of", "for", "with"], "correct": 0, "answerLine": "Answer: about", "explain": "สำนวน 'worried about' ใช้บอกความกังวลต่อสิ่งใดสิ่งหนึ่ง จึงต้องใช้ 'about'"}, {"q": "Choose the correct conditional (mixed): 'If he had saved money, he ___ a house now.'", "choices": ["would buy", "would have bought", "will buy", "bought"], "correct": 0, "answerLine": "Answer: would buy", "explain": "ประโยคเงื่อนไขแบบผสม (mixed conditional) ใช้เมื่อเงื่อนไขอยู่ในอดีต (had saved) แต่ผลลัพธ์อยู่ในปัจจุบัน (now) โครงสร้างคือ 'If + past perfect, would + verb (base form)' จึงต้องใช้ 'would buy'"}]}, {"numerical": [{"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 3, 6, 10, 15, 21, ?", "choices": ["27", "28", "29", "30"], "correct": 1, "answerLine": "เฉลย: 28", "explain": "ผลต่างระหว่างพจน์คือ 3, 4, 5, 6 ตามลำดับ (เพิ่มขึ้นทีละ 1) ผลต่างถัดไปคือ 7 นำไปบวกกับ 21 จะได้ 21 + 7 = 28"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 3, 9, 27, 81, 243, ?", "choices": ["732", "726", "729", "608"], "correct": 2, "answerLine": "เฉลย: 729", "explain": "แต่ละพจน์เกิดจากพจน์ก่อนหน้าคูณด้วย 3 ดังนั้นพจน์ถัดไปคือ 243 × 3 = 729"}, {"q": "สินค้าราคา 800 บาท ลดราคา 25% แล้วภายหลังปรับราคาขึ้นอีก 10% จากราคาที่ลดแล้ว ราคาสุดท้ายเป็นเท่าใด", "choices": ["660 บาท", "685 บาท", "680 บาท", "665 บาท"], "correct": 0, "answerLine": "เฉลย: 660 บาท", "explain": "ลด 25% จาก 800 = 800 × 75/100 = 600 บาท จากนั้นปรับขึ้น 10% จากราคาที่ลดแล้ว = 600 × 110/100 = 660 บาท (ข้อควรระวัง: ร้อยละที่สองคำนวณจากราคาใหม่ ไม่ใช่ราคาเดิม)"}, {"q": "นาย A ทำงานชิ้นหนึ่งเสร็จใน 10 วัน นาย B ทำงานชิ้นเดียวกันเสร็จใน 15 วัน ถ้าทั้งสองคนทำงานร่วมกัน จะเสร็จภายในกี่วัน", "choices": ["5 วัน", "8 วัน", "6 วัน", "7 วัน"], "correct": 2, "answerLine": "เฉลย: 6 วัน", "explain": "อัตราการทำงานของ A = 1/10 ของงานต่อวัน, ของ B = 1/15 ของงานต่อวัน รวมกัน = 1/10 + 1/15 = 1/6 ของงานต่อวัน ดังนั้นทำงานเสร็จใน 6 วัน"}, {"q": "นักเรียน 4 คน สอบได้คะแนนเฉลี่ย 65 คะแนน หากมีนักเรียนคนที่ 5 เข้ามาสอบและได้ 85 คะแนน คะแนนเฉลี่ยใหม่ของนักเรียนทั้ง 5 คนเป็นเท่าใด (ปัดเศษ 2 ตำแหน่ง)", "choices": ["70.0", "68.0", "67.0", "69.0"], "correct": 3, "answerLine": "เฉลย: 69.0", "explain": "คะแนนรวมเดิมของ 4 คน = 65 × 4 = 260 คะแนน เมื่อรวมคนที่ 5 ที่ได้ 85 คะแนน จะได้คะแนนรวม = 260 + 85 = 345 คะแนน หารด้วยจำนวนคน 5 คน = 345 ÷ 5 ≈ 69.0"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 1, 8, 27, 64, ?", "choices": ["1 ข้น = 180/5 ≈ 36.0%"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 7, 13, 21, 31, 43, ?", "choices": ["56", "59", "58", "57"], "correct": 3, "answerLine": "เฉลย: 57", "explain": "ผลต่างของพจน์คือ 6, 8, 10, 12 และผลต่างของผลต่าง (ผลต่างชั้นที่ 2) คงที่เท่ากับ 2 ดังนั้นผลต่างถัดไปคือ 14 นำไปบวกกับ 43 จะได้ 43 + 14 = 57"}, {"q": "ถ้า 50% ของจำนวนหนึ่งเท่ากับ 100 จำนวนนั้นคือเท่าใด", "choices": ["50", "200", "150", "210"], "correct": 1, "answerLine": "เฉลย: 200", "explain": "ให้จำนวนนั้นคือ x จะได้ 50/100 × x = 100 ดังนั้น x = 100 × 100/50 = 200"}, {"q": "ท่อน้ำท่อหนึ่งสามารถสูบน้ำเข้าถังจนเต็มได้ในเวลา 8 ชั่วโมง ในขณะที่มีท่อระบายน้ำออกซึ่งจะทำให้น้ำในถังที่เต็มไหลออกจนหมดได้ในเวลา 16 ชั่วโมง ถ้าเปิดทั้งสองท่อพร้อมกัน น้ำจะเต็มถังในเวลากี่ชั่วโมง", "choices": ["16 ชั่วโมง", "24 ชั่วโมง", "15 ชั่วโมง", "17 ชั่วโมง"], "correct": 0, "answerLine": "เฉลย: 16 ชั่วโมง", "explain": "อัตราการสูบเข้า = 1/8 ของถังต่อชั่วโมง อัตราการไหลออก = 1/16 ของถังต่อชั่วโมง อัตราสุทธิ = 1/8 − 1/16 = 1/16 ของถังต่อชั่วโมง ดังนั้นน้ำจะเต็มถังในเวลา 16 ชั่วโมง"}, {"q": "หนังสือจำนวน 240 เล่ม ถูกแบ่งให้ห้องสมุด 1/3 ของจำนวนทั้งหมด ห้องสมุดจะได้รับหนังสือกี่เล่ม", "choices": ["160 เล่ม", "77 เล่ม", "80 เล่ม", "83 เล่ม"], "correct": 2, "answerLine": "เฉลย: 80 เล่ม", "explain": "หนังสือที่ห้องสมุดได้รับ = 240 × 1/3 = 80 เล่ม"}, {"q": "รถยนต์คันหนึ่งขับไปสถานที่แห่งหนึ่งด้วยความเร็วเฉลี่ย 40 กม./ชม. และขับกลับด้วยความเร็วเฉลี่ย 120 กม./ชม. โดยใช้เส้นทางเดิม ความเร็วเฉลี่ยตลอดการเดินทางไป-กลับเป็นเท่าใด (กม./ชม.)", "choices": ["65", "55", "60", "80"], "correct": 2, "answerLine": "เฉลย: 60", "explain": "ความเร็วเฉลี่ยของการเดินทางไป-กลับ (ระยะทางเท่ากัน) คำนวณจากสูตรเฉลี่ยฮาร์มอนิก = 2×40×120/(40+120) = 9600/160 ≈ 60.0 กม./ชม. (ไม่ใช่ค่าเฉลี่ยเลขคณิตธรรมดา เพราะเวลาที่ใช้ในแต่ละขาไม่เท่ากัน)"}, {"q": "กระดิ่งสองใบดังพร้อมกันครั้งแรกเวลา 8:00 น. หากกระดิ่งใบแรกดังทุก 8 นาที และใบที่สองดังทุก 10 นาที กระดิ่งทั้งสองใบจะดังพร้อมกันอีกครั้งในอีกกี่นาทีข้างหน้า", "choices": ["48 นาที", "40 นาที", "80 นาที", _ the country.", "choices": ["will leave", "leave", "will have left", "left"], "correct": 2, "answerLine": "Answer: will have left", "explain": "เหตุการณ์ที่จะเสร็จสมบูรณ์ก่อนอีกเหตุการณ์หนึ่งในอนาคต (by the time you read) ต้องใช้ Future Perfect Tense คือ 'will have left'"}, {"q": "The advertisement was aimed ___ young professionals.", "choices": ["at", "to", "for", "on"], "correct": 0, "answerLine": "Answer: at", "explain": "สำนวน 'aimed at' ใช้บอกกลุ่มเป้าหมายของสิ่งใดสิ่งหนึ่ง จึงต้องใช้ 'at'"}, {"q": "The two companies are planning to ___ next year.", "choices": ["merge", "separate", "dissolve", "compete"], "correct": 0, "answerLine": "Answer: merge", "explain": "'Merge' หมายถึงการรวมกิจการเข้าด้วยกัน ตรงกับบริบทของสองบริษัทที่วางแผนรวมตัวกัน"}, {"q": "Choose the correct passive voice: 'The cake ___ by my mother yesterday.'", "choices": ["baked", "was baked", "is baked", "has baked"], "correct": 1, "answerLine": "Answer: was baked", "explain": "ประโยคนี้อยู่ในรูป passive voice ของ past simple tense (มีคำบอกเวลา 'yesterday') โครงสร้างคือ 'was/were + V3' จึงต้องใช้ 'was baked'"}, {"q": "She has been complaining ___ the noise from the construction site.", "choices": ["about", "of", "for", "with"], "correct": 0, "answerLine": "Answer: about", "explain": "สำนวน 'complain about' ใช้บอกสิ่งที่เป็นต้นเหตุของการบ่นหรือร้องเรียน จึงต้องใช้ 'about'"}, {"q": "The book was written ___ a famous author.", "choices": ["by", "from", "with", "of"], "correct": 0, "answerLine": "Answer: by", "explain": "เมื่อบอกผู้กระทำในรูป passive voice ต้องใช้ 'by' เสมอ"}, {"q": "Choose the closest synonym of 'Aggressive'.", "choices": ["Passive", "Hostile", "Calm", "Gentle"], "correct": 1, "answerLine": "Answer: Hostile", "explain": "'Aggressive' หมายถึงก้าวร้าวรุนแรง ใกล้เคียงกับ 'Hostile'"}, {"q": "She had to ___ several job offers before finding the right one.", "choices": ["turn down", "turn up", "turn into", "turn on"], "correct": 0, "answerLine": "Answer: turn down", "explain": "สำนวน 'turn down' หมายถึงปฏิเสธข้อเสนอ ตรงกับบริบทของการปฏิเสธข้อเสนองานหลายแห่ง"}]}, {"numerical": [{"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 8, 10, 14, 20, 28, ?", "choices": ["37", "40", "38", "39"], "correct": 2, "answerLine": "เฉลย: 38", "explain": "ผลต่างระหว่างพจน์คือ 2, 4, 6, 8 ตามลำดับ (เพิ่มขึ้นทีละ 2) ผลต่างถัดไปคือ 10 นำไปบวกกับ 28 จะได้ 28 + 10 = 38"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 2, 4, 8, 16, 32, ?", "choices": ["48", "66", "62", "64"], "correct": 3, "answerLine": "เฉลย: 64", "explain": "แต่ละพจน์เกิดจากพจน์ก่อนหน้าคูณด้วย 2 ดังนั้นพจน์ถัดไปคือ 32 × 2 = 64"}, {"q": "สินค้าราคา 800 บาท ลดราคา 15% แล้วภายหลังปรับราคาขึ้นอีก 5% จากราคาที่ลดแล้ว ราคาสุดท้ายเป็นเท่าใด", "choices": ["714 บาท", "734 บาท", "719 บาท", "720 บาท"], "correct": 0, "answerLine": "เฉลย: 714 บาท", "explain": "ลด 15% จาก 800 = 800 × 85/100 = 680 บาท จากนั้นปรับขึ้น 5% จากราคาที่ลดแล้ว = 680 × 105/100 = 714 บาท (ข้อควรระวัง: ร้อยละที่สองคำนวณจากราคาใหม่ ไม่ใช่ราคาเดิม)"}, {"q": "นาย A ทำงานชิ้นหนึ่งเสร็จใน 4 วัน นาย B ทำงานชิ้นเดียวกันเสร็จใน 12 วัน ถ้าทั้งสองคนทำงานร่วมกัน จะเสร็จภายในกี่วัน", "choices": ["5 วัน", "4 วัน", "2 วัน", "3 วัน"], "correct": 3, "answerLine": "เฉลย: 3 วัน", "explain": "อัตราการทำงานของ A = 1/4 ของงานต่อวัน, ของ B = 1/12 ของงานต่อวัน รวมกัน = 1/4 + 1/12 = 1/3 ของงานต่อวัน ดังนั้นทำงานเสร็จใน 3 วัน"}, {"q": "นักเรียน 5 คน สอบได้คะแนนเฉลี่ย 68 คะแนน หากมีนักเรียนคนที่ 6 เข้ามาสอบและได้ 50 คะแนน คะแนนเฉลี่ยใหม่ของนักเรียนทั้ง 6 คนเป็นเท่าใด (ปัดเศษ 2 ตำแหน่ง)", "choices": ["66.0", "64.0", "65.0", "68.0"], "correct": 2, "answerLine": "เฉลย: 65.0", "explain": "คะแนนรวมเดิมของ 5 คน = 68 × 5 = 340 คะแนน เมื่อรวมคนที่ 6 ที่ได้ 50 คะแนน จะได้คะแนนรวม = 340 + 50 = 390 คะแนน หารด้วยจำนวนคน 6 คน = 390 ÷ 6 ≈ 65.0"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 1, 8, 27, 64, ?", "choices": ["126", "117", "125", "124"], "correct": 2, "answerLine": "เฉลย: 125", "explain": "อนุกรมนี้คือกำลังสามของจำนวนนับ เรียงลำดับต่อเนื่องกัน ดังนั้นพจน์ถัดไปคือ 5³ = 125"}, {"q": "พ่อ lain": "ผลต่างของพจน์คือ 10, 16, 22, 28 และผลต่างของผลต่าง (ผลต่างชั้นที่ 2) คงที่เท่ากับ 6 ดังนั้นผลต่างถัดไปคือ 34 นำไปบวกกับ 81 จะได้ 81 + 34 = 115"}, {"q": "ถ้า 25% ของจำนวนหนึ่งเท่ากับ 80 จำนวนนั้นคือเท่าใด", "choices": ["20", "330", "105", "320"], "correct": 3, "answerLine": "เฉลย: 320", "explain": "ให้จำนวนนั้นคือ x จะได้ 25/100 × x = 80 ดังนั้น x = 80 × 100/25 = 320"}, {"q": "ท่อน้ำท่อหนึ่งสามารถสูบน้ำเข้าถังจนเต็มได้ในเวลา 8 ชั่วโมง ในขณะที่มีท่อระบายน้ำออกซึ่งจะทำให้น้ำในถังที่เต็มไหลออกจนหมดได้ในเวลา 12 ชั่วโมง ถ้าเปิดทั้งสองท่อพร้อมกัน น้ำจะเต็มถังในเวลากี่ชั่วโมง", "choices": ["25 ชั่วโมง", "24 ชั่วโมง", "23 ชั่วโมง", "20 ชั่วโมง"], "correct": 1, "answerLine": "เฉลย: 24 ชั่วโมง", "explain": "อัตราการสูบเข้า = 1/8 ของถังต่อชั่วโมง อัตราการไหลออก = 1/12 ของถังต่อชั่วโมง อัตราสุทธิ = 1/8 − 1/12 = 1/24 ของถังต่อชั่วโมง ดังนั้นน้ำจะเต็มถังในเวลา 24 ชั่วโมง"}, {"q": "หนังสือจำนวน 300 เล่ม ถูกแบ่งให้ห้องสมุด 2/5 ของจำนวนทั้งหมด ห้องสมุดจะได้รับหนังสือกี่เล่ม", "choices": ["120 เล่ม", "125 เล่ม", "180 เล่ม", "115 เล่ม"], "correct": 0, "answerLine": "เฉลย: 120 เล่ม", "explain": "หนังสือที่ห้องสมุดได้รับ = 300 × 2/5 = 120 เล่ม"}, {"q": "รถยนต์คันหนึ่งขับไปสถานที่แห่งหนึ่งด้วยความเร็วเฉลี่ย 40 กม./ชม. และขับกลับด้วยความเร็วเฉลี่ย 60 กม./ชม. โดยใช้เส้นทางเดิม ความเร็วเฉลี่ยตลอดการเดินทางไป-กลับเป็นเท่าใด (กม./ชม.)", "choices": ["43", "48", "53", "50"], "correct": 1, "answerLine": "เฉลย: 48", "explain": "ความเร็วเฉลี่ยของการเดินทางไป-กลับ (ระยะทางเท่ากัน) คำนวณจากสูตรเฉลี่ยฮาร์มอนิก = 2×40×60/(40+60) = 4800/100 ≈ 48.0 กม./ชม. (ไม่ใช่ค่าเฉลี่ยเลขคณิตธรรมดา เพราะเวลาที่ใช้ในแต่ละขาไม่เท่ากัน)"}, {"q": "กระดิ่งสองใบดังพร้อมกันครั้งแรกเวลา 8:00 น. หากกระดิ่งใบแรกดังทุก 8 นาที และใบที่สองดังทุก 10 นาที กระดิ่งทั้งสองใบจะดังพร้อมกันอีกครั้งในอีกกี่นาทีข้างหน้า", "choices": ["80 นาที", "48 นาที", "40 นาที", "30 นาที"], "correct": 2, "answerLine": "เฉลย: 40 นาที", "explain": "ต้องหา ค.ร.น. (LCM) ของ 8 และ 10 ซึ่งเท่ากับ 40 ดังนั้นกระดิ่งทั้งสองจะดังพร้อมกันอีกครั้งในอีก 40 he world."], "correct": 1, "answerLine": "Answer: If I were rich, I would travel the world.", "explain": "ประโยคเงื่อนไขแบบที่ 2 (สมมติที่ไม่เป็นจริงในปัจจุบัน) ใช้ 'were' กับทุกประธานในรูปแบบทางการ (subjunctive mood) คู่กับ 'would + verb'"}, {"q": "Water ___ into ice when the temperature drops below zero.", "choices": ["turns", "turned", "is turning", "will turn"], "correct": 0, "answerLine": "Answer: turns", "explain": "ข้อเท็จจริงทางวิทยาศาสตร์ที่เป็นจริงเสมอต้องใช้ Present Simple Tense คือ 'turns'"}, {"q": "She recovered quickly ___ her illness.", "choices": ["from", "of", "with", "for"], "correct": 0, "answerLine": "Answer: from", "explain": "สำนวน 'recover from' ใช้บอกการฟื้นตัวจากอาการเจ็บป่วยหรือปัญหา จึงต้องใช้ 'from'"}, {"q": "The sun ___ in the east every day.", "choices": ["rise", "rises", "rose", "is rising"], "correct": 1, "answerLine": "Answer: rises", "explain": "ข้อเท็จจริงที่เป็นจริงเสมอต้องใช้ Present Simple Tense กับประธานเอกพจน์ คือ 'rises'"}, {"q": "Choose the correct sentence.", "choices": ["The more you practice, the better you get.", "The more you practice, better you get.", "More you practice, the better you get.", "The more you practice, the more better you get."], "correct": 0, "answerLine": "Answer: The more you practice, the better you get.", "explain": "โครงสร้างเปรียบเทียบคู่ขนาน 'The + comparative..., the + comparative...' ใช้บอกความสัมพันธ์ที่แปรผันตามกัน จึงต้องใช้ 'The more...the better'"}, {"q": "Choose the closest antonym of 'Voluntary'.", "choices": ["Willing", "Compulsory", "Optional", "Free"], "correct": 1, "answerLine": "Answer: Compulsory", "explain": "'Voluntary' หมายถึงสมัครใจไม่ถูกบังคับ คำตรงข้ามคือ 'Compulsory' ซึ่งหมายถึงภาคบังคับ"}, {"q": "They ___ TV when the power went out.", "choices": ["watched", "were watching", "watch", "have watched"], "correct": 1, "answerLine": "Answer: were watching", "explain": "เหตุการณ์ที่กำลังดำเนินอยู่ในอดีตแล้วถูกขัดจังหวะด้วยอีกเหตุการณ์หนึ่ง (the power went out) ต้องใช้ Past Continuous Tense คือ 'were watching'"}, {"q": "The manager decided to ___ the meeting until all data was ready.", "choices": ["hold off", "hold on", "hold up", "hold out"], "correct": 0, "answerLine": "Answer: hold off", "explain": "สำนวน 'hold off' หมายถึงเลื่อนหรือรอไปก่อนจนกว่าจะพร้อม"}, {"q": "Choose the correct passive voice: 'Rice ___ widely in Thailand.'", "choices": ["grows", "is grown", "grew", "was growing"], "correct": 1, "answerLine": "Answer: is grown", "explain": "ข้อเท็จจริงทั่วไปในรูป passive voice ของ present simple tense ใช้โครงสร้าง 'is/are + V3' จึงต้องใช้ 'is grown'"}, {"q": "She is different ___ her sister in many ways.", "choices": ["from", "than", "with", "to"], "correct": 0, "answerLine": "Answer: from", "explain": "สำนวน 'different from' เป็นรูปแบบมาตรฐานที่ใช้บอกความแตกต่างระหว่างสิ่งสองสิ่ง"}, {"q": "He tends to ___ important details when he's in a hurry.", "choices": ["overlook", "emphasize", "remember", "highlight"], "correct": 0, "answerLine": "Answer: overlook", "explain": "'Overlook' หมายถึงมองข้ามหรือไม่สังเกตเห็น ตรงกับบริบทของการรีบร้อนจนพลาดรายละเอียดสำคัญ"}]}, {"numerical": [{"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 6, 8, 12, 18, 26, ?", "choices": ["38", "35", "36", "37"], "correct": 2, "answerLine": "เฉลย: 36", "explain": "ผลต่างระหว่างพจน์คือ 2, 4, 6, 8 ตามลำดับ (เพิ่มขึ้นทีละ 2) ผลต่างถัดไปคือ 10 นำไปบวกกับ 26 จะได้ 26 + 10 = 36"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 5, 10, 20, 40, 80, ?", "choices": ["158", "162", "160", "120"], "correct": 2, "answerLine": "เฉลย: 160", "explain": "แต่ละพจน์เกิดจากพจน์ก่อนหน้าคูณด้วย 2 ดังนั้นพจน์ถัดไปคือ 80 × 2 = 160"}, {"q": "สินค้าราคา 800 บาท ลดราคา 25% แล้วภายหลังปรับราคาขึ้นอีก 5% จากราคาที่ลดแล้ว ราคาสุดท้ายเป็นเท่าใด", "choices": ["630 บาท", "635 บาท", "650 บาท", "640 บาท"], "correct": 0, "answerLine": "เฉลย: 630 บาท", "explain": "ลด 25% จาก 800 = 800 × 75/100 = 600 บาท จากนั้นปรับขึ้น 5% จากราคาที่ลดแล้ว = 600 × 105/100 = 630 บาท (ข้อควรระวัง: ร้อยละที่สองคำนวณจากราคาใหม่ ไม่ใช่ร บี้ยแบบคงต้น) เป็นเวลา 3 ปี จะได้ดอกเบี้ยรวมทั้งสิ้นเท่าใด", "choices": ["360 บาท", "120 บาท", "240 บาท", "80 บาท"], "correct": 2, "answerLine": "เฉลย: 240 บาท", "explain": "ดอกเบี้ยแบบคงต้น = เงินต้น × อัตราดอกเบี้ย × ระยะเวลา / 100 = 2000 × 4 × 3 / 100 = 240 บาท"}, {"q": "ปัจจุบันพ่ออายุมากกว่าลูก 26 ปี ถ้าลูกอายุ 9 ปีในปัจจุบัน อีก 7 ปีข้างหน้าพ่อจะมีอายุเท่าใด", "choices": ["16 ปี", "40 ปี", "49 ปี", "42 ปี"], "correct": 3, "answerLine": "เฉลย: 42 ปี", "explain": "ปัจจุบันพ่ออายุ = 9 + 26 = 35 ปี อีก 7 ปีข้างหน้า พ่อจะอายุ 35 + 7 = 42 ปี"}, {"q": "ผสมสารละลายเข้มข้น 30% ปริมาณ 3 ลิตร กับสารละลายเข้มข้น 60% ปริมาณ 2 ลิตร จะได้สารละลายผสมมีความเข้มข้นร้อยละเท่าใด", "choices": ["45.0%", "42.0%", "47.0%", "37.0%"], "correct": 1, "answerLine": "เฉลย: 42.0%", "explain": "ปริมาณสารบริสุทธิ์รวม = (3×30) + (2×60) = 90 + 120 = 210 ปริมาตรรวม = 3+2 = 5 ลิตร ความเข้มข้น = 210/5 ≈ 42.0%"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 8, 18, 34, 56, 84, ?", "choices": ["118", "119", "117", "120"], "correct": 0, "answerLine": "เฉลย: 118", "explain": "ผลต่างของพจน์คือ 10, 16, 22, 28 และผลต่างของผลต่าง (ผลต่างชั้นที่ 2) คงที่เท่ากับ 6 ดังนั้นผลต่างถัดไปคือ 34 นำไปบวกกับ 84 จะได้ 84 + 34 = 118"}, {"q": "ถ้า 30% ของจำนวนหนึ่งเท่ากับ 120 จำนวนนั้นคือเท่าใด", "choices": ["410", "150", "400", "36"], "correct": 2, "answerLine": "เฉลย: 400", "explain": "ให้จำนวนนั้นคือ x จะได้ 30/100 × x = 120 ดังนั้น x = 120 × 100/30 = 400"}, {"q": "ท่อน้ำท่อหนึ่งสามารถสูบน้ำเข้าถังจนเต็มได้ในเวลา 4 ชั่วโมง ในขณะที่มีท่อระบายน้ำออกซึ่งจะทำให้น้ำในถังที่เต็มไหลออกจนหมดได้ในเวลา 16 ชั่วโมง ถ้าเปิดทั้งสองท่อพร้อมกัน น้ำจะเต็มถังในเวลากี่ชั่วโมง", "choices": ["17/3 ชั่วโมง", "16/3 ชั่วโมง", "20 ชั่วโมง", "16/5 ชั่วโมง"], "correct": 1, "answerLine": "เฉลย: 16/3 ชั่วโมง", "explain": "อัตราการสูบเข้า = 1/4 ของถังต่อชั่วโมง อัตราการไหลออก = 1/16 ของถังต่อชั่วโมง อัตราสุทธิ = 1/4 − 1/16 = 3/16 ของถังต่อชั่วโมง ดังนั้นน้ำจะเต็มถังในเวลา 16/3 ชั่วโมง"}, {"q": "หนังสือจำนวน 360 เล่ม ถูกแบ่งให้ห้องสมุด 3/5 ของจำนวน  1990 ___ a small village.", "choices": ["in / in", "on / at", "at / in", "in / at"], "correct": 0, "answerLine": "Answer: in / in", "explain": "เมื่อกล่าวถึงปีจะใช้ 'in' และเมื่อกล่าวถึงสถานที่ขนาดใหญ่ เช่น หมู่บ้าน เมือง ก็ใช้ 'in' เช่นกัน"}, {"q": "He succeeded ___ finishing the marathon despite the injury.", "choices": ["in", "at", "on", "with"], "correct": 0, "answerLine": "Answer: in", "explain": "สำนวน 'succeed in + doing something' ใช้บอกความสำเร็จในการทำสิ่งใดสิ่งหนึ่ง จึงต้องใช้ 'in'"}, {"q": "The old building was ___ to make way for a new shopping mall.", "choices": ["demolished", "constructed", "renovated", "painted"], "correct": 0, "answerLine": "Answer: demolished", "explain": "'Demolished' หมายถึงถูกทำลายหรือรื้อถอน ตรงกับบริบทของการรื้ออาคารเก่าเพื่อสร้างสิ่งใหม่"}, {"q": "Choose the closest synonym of 'Robust'.", "choices": ["Weak", "Sturdy", "Fragile", "Feeble"], "correct": 1, "answerLine": "Answer: Sturdy", "explain": "'Robust' หมายถึงแข็งแรงทนทาน ใกล้เคียงกับ 'Sturdy'"}, {"q": "The company ___ its profits significantly over the past five years.", "choices": ["increases", "increased", "has increased", "was increasing"], "correct": 2, "answerLine": "Answer: has increased", "explain": "เหตุการณ์ที่เริ่มในอดีตและดำเนินต่อเนื่องมาถึงปัจจุบัน (over the past five years) ต้องใช้ Present Perfect Tense คือ 'has increased'"}, {"q": "Choose the correct sentence.", "choices": ["Hardly he had arrived when the phone rang.", "Hardly had he arrived when the phone rang.", "Hardly he arrived when the phone rang.", "He hardly had arrived when the phone rang."], "correct": 1, "answerLine": "Answer: Hardly had he arrived when the phone rang.", "explain": "เมื่อขึ้นต้นประโยคด้วย 'Hardly' ต้องมีการสลับตำแหน่งกริยาช่วยกับประธาน (inversion) จึงต้องใช้ 'Hardly had he arrived...'"}, {"q": "The scientists are trying to ___ a cure for the disease.", "choices": ["develop", "destroy", "abandon", "ignore"], "correct": 0, "answerLine": "Answer: develop", "explain": "'Develop' หมายถึงพัฒนาหรือคิดค้นสิ่งใหม่ ตรงกับบริบทของการคิดค้นวิธีรักษาโรค"}, {"q": "He ___ football every weekend when he was young.", "choices": ["plays", "played", "was playing", "has played"], "correct": 1, "answerLine": "Answer: played", "explain": "เหตุการณ์ที่เป็นความเคยชินในอดีตซึ่งไม่เกิดขึ้นอีกแล้วในปัจจุบัน ต้องใช้ Past Simple Tense คือ 'played'"}, {"q": "Choose the correct sentence.", "choices": ["Not until she apologized did I forgive her.", "Not until she apologized I forgave her.", "Not until she apologized, did I forgive her.", "I did not forgive her not until she apologized."], "correct": 0, "answerLine": "Answer: Not until she apologized did I forgive her.", "explain": "เมื่อขึ้นต้นประโยคด้วย 'Not until' ต้องมีการสลับตำแหน่งกริยาช่วยกับประธาน (inversion) จึงต้องใช้ 'Not until she apologized did I forgive her.'"}, {"q": "He was absent ___ school for three days last week.", "choices": ["from", "at", "in", "of"], "correct": 0, "answerLine": "Answer: from", "explain": "สำนวน 'absent from' ใช้บอกการขาดเรียนหรือขาดงาน จึงต้องใช้ 'from'"}, {"q": "Choose the closest antonym of 'Ample'.", "choices": ["Sufficient", "Plentiful", "Insufficient", "Generous"], "correct": 2, "answerLine": "Answer: Insufficient", "explain": "'Ample' หมายถึงมีมากเพียงพอ คำตรงข้ามคือ 'Insufficient' ซึ่งหมายถึงไม่เพียงพอ"}]}, {"numerical": [{"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 9, 12, 18, 27, 39, ?", "choices": ["55", "53", "56", "54"], "correct": 3, "answerLine": "เฉลย: 54", "explain": "ผลต่างระหว่างพจน์คือ 3, 6, 9, 12 ตามลำดับ (เพิ่มขึ้นทีละ 3) ผลต่างถัดไปคือ 15 นำไปบวกกับ 39 จะได้ 39 + 15 = 54"}, {"q": "อนุกรมต่อไปนี้ ตัวเลขถัดไปคือเท่าใด: 3, 6, 12, 24, 48, ?", "choices": ["96", "94", "98", "72"], "correct": 0, "answerLine": "เฉลย: 96", "explain": "แต่ละพจน์เกิดจากพจน์ก่อนหน้าคูณด้วย 2 ดังนั้นพจน์ถัดไปคือ 48 × 2 = 96"}, {"q": "สินค้าราคา 1000 บาท ลดราคา 25% แล้วภายหลังปรับราคาขึ้นอีก 5% จากราคาที่ลดแล้ว ราคาสุดท้ายเป็นเท่าใด", "choices": ["788 บาท", "793 บาท", "808 บาท", "800 บาท"], "c
